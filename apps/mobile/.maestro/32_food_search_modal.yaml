# @cases TC-SEARCH-02
# @screen FoodSearchModal
appId: com.supprclub.supprapp
name: "Food search modal — search, results, portion selection"
---
- runFlow: shared/login.yaml

- tapOn:
    id: "tab-today"
- waitForAnimationToEnd

# Quick-log strip retired 2026-04-27 (Phase 3 / B2.1). Entry is now:
# LogFab → LogSheet opens → tap "Search foods" row. The FAB has
# accessibilityLabel "Log a meal"; the search row has accessibilityLabel
# "Search foods". (See LogFab.tsx + LogSheet.tsx.)
- tapOn:
    id: "today-log-fab"
- waitForAnimationToEnd
- waitForAnimationToEnd
# Assert via the visible header text rather than testID. iOS 26 +
# RN Modal + accessibilityViewIsModal: the testIDs inside the modal
# aren't always exposed in Maestro's accessibility traversal until
# the modal animation fully settles. The "Log a meal" header text is
# Text-rendered (line 262) and reliably appears in the tree.
- assertVisible:
    text: "^Log a meal$"
# The "Search foods" Pressable has accessibilityLabel "Search foods"
# but its inner visible text is the longer placeholder "Search foods,
# brands, or recipes" — text:-based matching is ambiguous, so use the
# accessibilityLabel directly.
- tapOn:
    text: "^Search foods$"
- waitForAnimationToEnd

# Verify food search screen/modal loaded
- assertVisible:
    text: ".*(?:Food search|Search foods).*"

# Type a common food item
- tapOn:
    text: ".*(?:Search foods|Search).*"
    index: 0
- inputText: "chicken breast"
- waitForAnimationToEnd

# Tap search or submit
- runFlow:
    when:
      visible:
        id: "food-search-submit"
    commands:
      - tapOn:
          id: "food-search-submit"

- runFlow:
    when:
      notVisible:
        id: "food-search-submit"
    commands:
      - pressKey: Enter

- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

# Should show results or API unavailable message
- runFlow:
    when:
      visible: ".*(?:FDC|chicken|Chicken|breast|Breast|kcal|cal).*"
    commands:
      # Results are showing — verify result items have nutrition info
      - assertVisible:
          text: ".*(?:kcal|cal|Calories).*"
      # Tap the first result to see detail/portion selection
      - tapOn:
          text: ".*(?:chicken|Chicken).*"
          index: 0
      - waitForAnimationToEnd
      # Should show portion or quantity selection
      - assertVisible:
          text: ".*(?:Serving|Amount|Portion|Log|Add|g |oz).*"
      # Go back without logging
      - back
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: ".*Food search isn't available.*"
    commands:
      - assertVisible: ".*Food search isn't available.*"

# Go back to Today
- back
- waitForAnimationToEnd
