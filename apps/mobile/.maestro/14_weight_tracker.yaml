appId: com.supprclub.supprapp
name: "Weight tracker — sections, input, charts"
---
- runFlow: shared/login.yaml

- tapOn: ".*Progress.*"
- waitForAnimationToEnd

# Scroll to find weight entry point
- scrollUntilVisible:
    element: ".*Weight.*"
    direction: DOWN

# Tap into weight tracker
- tapOn: ".*Weight.*"
- waitForAnimationToEnd

# Weight tracker screen sections
- assertVisible: ".*Weight.*"

# Should see input field for weight
- assertVisible:
    text: ".*(?:Weight \\(kg\\)|Weight \\(lb\\)).*"

# Save button
- assertVisible: ".*Save.*"

# Journey section
- scrollUntilVisible:
    element: ".*Journey.*"
    direction: DOWN

# Steps section
- scrollUntilVisible:
    element: ".*Steps.*"
    direction: DOWN

# Water section
- scrollUntilVisible:
    element: ".*Water.*"
    direction: DOWN

# Body Fat section
- scrollUntilVisible:
    element: ".*Body Fat.*"
    direction: DOWN

# Navigate back
- tapOn:
    point: "5%,8%"
