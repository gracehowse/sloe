appId: com.supprclub.supprapp
name: "Weight tracker — sections, input, charts"
---
- runFlow: shared/login.yaml

- tapOn: ".*Progress.*"
- waitForAnimationToEnd

# Scroll to find weight entry point
- scrollUntilVisible:
    element: ".*Weight.*"
    direction: DOWN

# Tap into weight tracker
- tapOn: ".*Weight.*"
- waitForAnimationToEnd

# Weight tracker screen sections
- assertVisible: ".*Weight.*"

# Should see input field for weight
- assertVisible:
    text: ".*(?:Weight \\(kg\\)|Weight \\(lb\\)).*"

# Save button
- assertVisible: ".*Save.*"

# Journey section
- scrollUntilVisible:
    element: ".*Journey.*"
    direction: DOWN

# Steps section
- scrollUntilVisible:
    element: ".*Steps.*"
    direction: DOWN

# Water section — only renders with ≥2 days of logged water; treat as optional
- runFlow:
    when:
      visible: ".*Water.*"
    commands:
      - assertVisible: ".*Water.*"

# Body Fat section — only renders with logged body-fat data; optional
- runFlow:
    when:
      visible: ".*Body Fat.*"
    commands:
      - assertVisible: ".*Body Fat.*"

# Navigate back
- tapOn:
    point: "5%,8%"
