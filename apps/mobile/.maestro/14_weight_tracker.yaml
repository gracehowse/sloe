appId: com.supprclub.supprapp
name: "Weight tracker — sections, input, charts"
---
- runFlow: shared/login.yaml

- tapOn: ".*Progress, tab.*"
- waitForAnimationToEnd

# Scroll to find weight entry point
- scrollUntilVisible:
    element: ".*Weight.*"
    direction: DOWN

# Tap into weight tracker
- tapOn: ".*Weight.*"
- waitForAnimationToEnd

# Weight tracker screen sections
- assertVisible: ".*Weight.*"

# Weight entry (testID is stable vs placeholder kg/lb copy)
- scrollUntilVisible:
    element:
      id: "weight-tracker-input"
    direction: DOWN
- assertVisible:
    id: "weight-tracker-input"

# Save button
- assertVisible: ".*Save.*"

# Journey section
- scrollUntilVisible:
    element: ".*Journey.*"
    direction: DOWN

# Steps section
- scrollUntilVisible:
    element: ".*Steps.*"
    direction: DOWN

# Water section — only renders with ≥2 days of logged water; treat as optional
- runFlow:
    when:
      visible: ".*Water.*"
    commands:
      - assertVisible: ".*Water.*"

# Body Fat section — only renders with logged body-fat data; optional
- runFlow:
    when:
      visible: ".*Body Fat.*"
    commands:
      - assertVisible: ".*Body Fat.*"

# Navigate back
- tapOn:
    point: "5%,8%"
