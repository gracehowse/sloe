appId: com.supprclub.supprapp
name: "Weight tracker — sections, input, charts"
---
- runFlow: shared/login.yaml

# The "Weight" section title on Progress (line 1783) is not interactive
# — only the "Trend" stat tile (top of Progress) and the WeightSparseState
# "Log weight" button (only renders <3 weight logs) navigate to
# /weight-tracker. Deeplink directly to skip flaky tile tapping.
- openLink: suppr:///weight-tracker
- waitForAnimationToEnd
- waitForAnimationToEnd

# Weight tracker screen sections
- assertVisible: ".*Weight.*"

# Weight entry (testID is stable vs placeholder kg/lb copy)
- scrollUntilVisible:
    element:
      id: "weight-tracker-input"
    direction: DOWN
- assertVisible:
    id: "weight-tracker-input"

# Save button
- assertVisible: ".*Save.*"

# Journey section
- scrollUntilVisible:
    element: ".*Journey.*"
    direction: DOWN

# Steps section
- scrollUntilVisible:
    element: ".*Steps.*"
    direction: DOWN

# Water section — only renders with ≥2 days of logged water; treat as optional
- runFlow:
    when:
      visible: ".*Water.*"
    commands:
      - assertVisible: ".*Water.*"

# Body Fat section — only renders with logged body-fat data; optional
- runFlow:
    when:
      visible: ".*Body Fat.*"
    commands:
      - assertVisible: ".*Body Fat.*"

# Return to Today so the next flow's launchApp resumes on a tab shell
# rather than persisted /weight-tracker state.
- tapOn:
    id: "tab-today"
- waitForAnimationToEnd
