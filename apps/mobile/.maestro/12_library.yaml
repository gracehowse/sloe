# @cases TC-LIB-01
# @screen (tabs)/library
appId: com.supprclub.supprapp
name: "Library — header, search, sort, empty state"
---
- runFlow: shared/login.yaml

- tapOn:
    id: "tab-recipes"
- waitForAnimationToEnd

# tab-recipes lands on /(tabs)/library directly (Library is the default
# sub-tab in the Recipes group post 2026-04-27 IA collapse). The legacy
# "My Library" CTA on Today is gone — no extra navigation needed.

# Library screen should load
- assertVisible: ".*Library.*"

# Visual baseline #1 — Library landing.
- takeScreenshot: screenshots/latest/library-01-landing

# Sort button should be visible
- assertVisible:
    text: ".*(?:Recent|Calories|Protein).*"

# Search field (placeholder and/or accessibilityLabel)
- assertVisible: ".*(?:Search saved recipes|Search your recipes).*"

# If there are saved recipes, verify card structure
- runFlow:
    when:
      visible: ".*kcal.*"
    commands:
      - assertVisible: ".*kcal.*"

# If library is empty, verify empty state
- runFlow:
    when:
      visible: ".*No saved recipes.*"
    commands:
      - assertVisible: ".*No saved recipes.*"
      - assertVisible: ".*Go to Discover.*"
      - assertVisible: ".*Import a recipe.*"

# Test sort cycling
- tapOn:
    text: ".*(?:Recent|Calories|Protein).*"
- waitForAnimationToEnd
