appId: com.supprclub.supprapp
name: "Nutrition Sources — info screen with all data sources"
---
- runFlow: shared/login.yaml

# PRODUCT GAP (2026-04-29): Help & Information row lives on /more,
# which is UI-orphaned post Group G IA collapse (no More pill anymore).
# Deeplink to /more until the row migrates into /settings.
- openLink: suppr:///more
- waitForAnimationToEnd
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*Account.*"
    timeout: 15000

# Navigate to Help & Information, or directly to nutrition sources
# Nutrition sources is accessible from various paths; go via profile
- scrollUntilVisible:
    element: ".*Help & Information.*"
    direction: DOWN
- tapOn: ".*Help & Information.*"
- waitForAnimationToEnd

# If Help opens in-app (the screen exists), verify content
# Otherwise the external link opens — skip gracefully
- runFlow:
    when:
      visible: ".*About nutrition data.*"
    commands:
      # Verify screen header
      - assertVisible: ".*About nutrition data.*"

      # Verify all three data sources are listed
      - assertVisible: ".*USDA FoodData Central.*"
      - scrollUntilVisible:
          element: ".*Open Food Facts.*"
          direction: DOWN
      - assertVisible: ".*Open Food Facts.*"
      - scrollUntilVisible:
          element: ".*FatSecret Platform API.*"
          direction: DOWN
      - assertVisible: ".*FatSecret Platform API.*"

      # Verify disclaimer text
      - scrollUntilVisible:
          element: ".*Nutrition values are estimates.*"
          direction: DOWN
      - assertVisible: ".*Nutrition values are estimates.*"

      # Go back
      - tapOn: ".*Back.*"
      - waitForAnimationToEnd

# Return to Today so the next flow's launchApp resumes on a tab shell.
- tapOn:
    id: "tab-today"
- waitForAnimationToEnd
