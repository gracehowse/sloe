# @cases TC-SETTINGS-01
# @screen (tabs)/settings
appId: com.supprclub.supprapp
name: "Settings hub — sections, navigation, profile info"
---
- runFlow: shared/login.yaml

# Group G IA Batch D (2026-04-30): /more is now a redirect to
# /settings. Both deeplinks resolve to /settings; we point directly
# at /settings so the flow's intent is unambiguous.
- openLink: suppr:///settings
- waitForAnimationToEnd
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Settings"
    timeout: 15000

# Verify tier label
- assertVisible:
    text: ".*(?:Free|Pro|Base).*"

# Bundle stats strip (Recipes / Streak)
- scrollUntilVisible:
    element: ".*Recipes.*"
    direction: DOWN
- assertVisible: ".*Recipes.*"
- assertVisible: ".*Streak.*"

# Goals & targets bundle section
- scrollUntilVisible:
    element: ".*Goals & targets.*"
    direction: DOWN
- assertVisible: ".*Goals & targets.*"
- assertVisible: ".*Daily targets.*"
- assertVisible: ".*Dashboard widgets.*"
- assertVisible: ".*Week starts on.*"

# Connections
- scrollUntilVisible:
    element: ".*Apple Health.*"
    direction: DOWN
- assertVisible: ".*Apple Health.*"
- scrollUntilVisible:
    element: ".*Notifications.*"
    direction: DOWN
- assertVisible: ".*Notifications.*"

# Recipes section
- scrollUntilVisible:
    element: ".*Create recipe.*"
    direction: DOWN
- assertVisible: ".*Create recipe.*"

# Bundle's App section
- scrollUntilVisible:
    element: ".*Help & information.*"
    direction: DOWN
- assertVisible: ".*Export nutrition log.*"
- assertVisible: ".*Help & information.*"

# Legal
- scrollUntilVisible:
    element: ".*Legal.*"
    direction: DOWN
- assertVisible: ".*Privacy policy.*"
- assertVisible: ".*Terms of use.*"

# Danger zone
- scrollUntilVisible:
    element: ".*Danger zone.*"
    direction: DOWN
- assertVisible: ".*Reset or erase data.*"
- assertVisible: ".*Delete my account.*"

# Navigate into Daily targets
- scrollUntilVisible:
    element: ".*Daily targets.*"
    direction: UP
- tapOn: ".*Daily targets.*"
- waitForAnimationToEnd
- waitForAnimationToEnd

# Verify targets editor loaded
- assertVisible:
    text: ".*(?:Goals & Targets|Daily Targets|Calories|Profile).*"

# Navigate back
- tapOn:
    point: "5%,8%"
- waitForAnimationToEnd

# Return to Today so the next flow's launchApp resumes on a tab shell.
- tapOn:
    id: "tab-today"
- waitForAnimationToEnd
