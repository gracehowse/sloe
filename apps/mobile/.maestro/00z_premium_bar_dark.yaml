appId: com.supprclub.supprapp
name: "Premium-bar dark sweep — canonical surfaces in dark appearance"
---
# Premium-bar dark sweep.
#
# Mirrors the canonical surface list from 00z_expanded_visual_sweep.yaml,
# but assumes the iOS sim has been put into dark appearance BEFORE the
# run. Mobile Suppr's ThemeProvider defaults to `auto` (system scheme),
# so flipping the sim appearance is enough — no in-app toggle exists.
#
# Run sequence (from repo root):
#   1. xcrun simctl ui booted appearance dark
#   2. cd apps/mobile && maestro test .maestro/00z_premium_bar_dark.yaml
#   3. xcrun simctl ui booted appearance light  # restore after
#
# Output: apps/mobile/screenshots/latest/dark-<NN>-<name>.png (same dir
# as every other capture, so the auditor finds them via one path).

- launchApp:
    appId: com.supprclub.supprapp

# ──────────────────────────────────────────────────────────────────────
# Tab landings — dark
# ──────────────────────────────────────────────────────────────────────

- openLink: suppr:///
- extendedWaitUntil:
    visible:
      id: "screen-today"
    timeout: 30000
- waitForAnimationToEnd
- takeScreenshot: screenshots/latest/dark-01-today-default
- swipe:
    direction: UP
- waitForAnimationToEnd
- takeScreenshot: screenshots/latest/dark-02-today-scrolled

- openLink: suppr:///library
- extendedWaitUntil:
    visible:
      id: "screen-library"
    timeout: 15000
- takeScreenshot: screenshots/latest/dark-10-recipes-library

- openLink: suppr:///discover
