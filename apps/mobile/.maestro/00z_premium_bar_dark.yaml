appId: com.supprclub.supprapp
name: "Premium-bar dark sweep — canonical surfaces in dark appearance"
---
# Premium-bar dark sweep.
#
# Mirrors the canonical surface list from 00z_expanded_visual_sweep.yaml,
# but REQUIRES the iOS sim to already be in dark appearance. Mobile
# Suppr's ThemeProvider defaults to `auto` (system scheme), so flipping
# the sim appearance is what makes the app render dark — there's no
# in-app toggle. Maestro can't shell out, so the appearance step has to
# happen BEFORE the flow runs.
#
# **DO NOT INVOKE THIS FLOW DIRECTLY.** Use the wrapper:
#
#   npm run mobile:test:dark-sweep
#   # or, equivalently:
#   apps/mobile/scripts/run-dark-sweep.sh
#
# The wrapper sets the sim appearance to dark, runs this flow, and
# restores light on exit. Running `maestro test 00z_premium_bar_dark.yaml`
# directly will produce LIGHT-mode captures in `dark-*.png` files —
# a silent failure that wasted half a session on 2026-05-17. The retro
# and the wrapper are why this comment exists.
#
# Output: apps/mobile/screenshots/latest/dark-<NN>-<name>.png (same dir
# as every other capture, so the auditor finds them via one path).

- launchApp:
    appId: com.supprclub.supprapp

# ──────────────────────────────────────────────────────────────────────
# Tab landings — dark
# ──────────────────────────────────────────────────────────────────────

- openLink: suppr:///
- extendedWaitUntil:
    visible:
      id: "today-hydrated"
    timeout: 30000
- waitForAnimationToEnd
- takeScreenshot: screenshots/latest/dark-01-today-default
- swipe:
    direction: UP
- waitForAnimationToEnd
- takeScreenshot: screenshots/latest/dark-02-today-scrolled

- openLink: suppr:///library
- extendedWaitUntil:
