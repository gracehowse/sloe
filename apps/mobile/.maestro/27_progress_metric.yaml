appId: com.supprclub.supprapp
name: "Progress Metric Detail — calorie/protein/streak deep dive"
---
- runFlow: shared/login.yaml

- tapOn:
    id: "tab-you"
- waitForAnimationToEnd
- waitForAnimationToEnd

# Verify the Progress screen renders with at least one metric tile.
# Titles are rendered uppercase via CSS textTransform but the underlying
# text nodes are mixed case ("Avg Calories" / "Protein Hit" / "Streak").
# The "Avg Calories" title becomes "Avg on logged days (X/7)" on partial
# weeks (progress.tsx:1229), so match either prefix.
- extendedWaitUntil:
    visible: ".*(?:Avg Calories|Avg on logged days|Protein Hit|Streak|Your progress will appear here).*"
    timeout: 30000

# If a tile is present, drill into Avg Calories detail and verify metric page renders.
- runFlow:
    when:
      visible: ".*(?:Avg Calories|Avg on logged days).*"
    commands:
      - tapOn: ".*(?:Avg Calories|Avg on logged days).*"
      - waitForAnimationToEnd
      - waitForAnimationToEnd

      # Metric detail page shows calorie summary and per-day breakdown
      - assertVisible:
          text: ".*(?:Calories|calories|kcal).*"
      - assertVisible:
          text: ".*(?:Mon|Tue|Wed|Thu|Fri|Sat|Sun).*"

      - back
      - waitForAnimationToEnd
