appId: com.supprclub.supprapp
name: "Connect to Expo dev server"
---
- launchApp

# Tap "Enter URL manually"
- tapOn: ".*Enter URL manually.*"
- waitForAnimationToEnd

# Type the Metro URL (pass -e EXPO_DEV_SERVER_URL=... when running the parent flow, or edit for one-off)
- inputText: ${EXPO_DEV_SERVER_URL}
- pressKey: Enter

# Wait for the app to bundle and load
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
