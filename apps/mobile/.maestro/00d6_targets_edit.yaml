- waitForAnimationToEnd
- waitForAnimationToEnd
- takeScreenshot: screenshots/latest/state-70-targets-summary
- tapOn: "Edit"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- takeScreenshot: screenshots/latest/state-71-profile-edit
