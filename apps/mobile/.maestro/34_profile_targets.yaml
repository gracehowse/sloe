appId: com.supprclub.supprapp
name: "Profile & targets — nutrition goals, dietary prefs, body stats"
---
- runFlow: shared/login.yaml

# PRODUCT GAP (2026-04-29): Daily Targets row lives in /more's
# Goals & Targets section, which is UI-orphaned post Group G IA
# collapse. Daily target editing is currently unreachable via taps;
# deeplink keeps this flow alive until the Settings migration completes.
- openLink: suppr:///more
- waitForAnimationToEnd
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*Account.*"
    timeout: 15000

- scrollUntilVisible:
    element: ".*Daily Targets.*"
    direction: DOWN
- tapOn: ".*Daily Targets.*"
- waitForAnimationToEnd
- waitForAnimationToEnd

# Verify the profile/targets screen loaded
- assertVisible:
    text: ".*(?:Goals & Targets|Daily Targets|Calories|Profile).*"

# Verify calorie/macro targets are visible
- assertVisible:
    text: ".*(?:Calories|kcal).*"
- assertVisible:
    text: ".*(?:Protein|protein).*"
- assertVisible:
    text: ".*(?:Carbs|carbs).*"
- assertVisible:
    text: ".*(?:Fat|fat).*"

# Profile editor surfaces nutrition targets + dietary preferences only.
# Body stats / goal / activity live in onboarding, not here. Verify dietary section.
- scrollUntilVisible:
    element: ".*Dietary Preferences.*"
    direction: DOWN
- assertVisible: ".*Dietary Preferences.*"

# Scroll back to top
- scrollUntilVisible:
    element: ".*(?:Calories|kcal).*"
    direction: UP

# Navigate back
- tapOn:
    point: "5%,8%"
- waitForAnimationToEnd

# Return to Today so the next flow's launchApp resumes on a tab shell.
- tapOn:
    id: "tab-today"
- waitForAnimationToEnd
