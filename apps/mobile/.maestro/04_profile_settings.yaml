appId: com.supprclub.supprapp
name: "Profile & settings — sections, navigation, data export"
---
- runFlow: shared/login.yaml

- tapOn: ".*More, tab.*"
- waitForAnimationToEnd

# Check top-of-screen sections (visible without scroll)
- assertVisible: ".*Goals & Targets.*"
- assertVisible: ".*Daily Targets.*"
- assertVisible: ".*kcal.*"

# Connections section is partway down the screen
- scrollUntilVisible:
    element: ".*Connections.*"
    direction: DOWN
- assertVisible: ".*Connections.*"

# Help link / Export rows live in the App section further down. G-6
# (2026-04-19) replaced the single "Export Data" row with a CSV-primary
# row + JSON-secondary row; pin the primary label here.
- scrollUntilVisible:
    element: ".*Export nutrition log.*"
    direction: DOWN
- assertVisible: ".*Export nutrition log.*"
- assertVisible: ".*Export all data.*"
- assertVisible: ".*Help & Information.*"

# Legal section is near the bottom
- scrollUntilVisible:
    element: ".*Legal.*"
    direction: DOWN
- assertVisible: ".*Legal.*"

# Privacy Policy
- scrollUntilVisible:
    element: ".*Privacy Policy.*"
    direction: DOWN
- assertVisible: ".*Privacy Policy.*"

# Terms
- assertVisible: ".*Terms of Use.*"
