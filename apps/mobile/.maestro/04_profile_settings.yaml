appId: com.supprclub.supprapp
name: "Profile & settings — sections, navigation, data export"
---
- runFlow: shared/login.yaml

# PRODUCT GAP (flagged 2026-04-29): the Group G IA decision
# (docs/decisions/2026-04-28-group-g-ia-collapse.md) removed the "More"
# sub-tab pill — only Progress / Settings exist on the You tab now.
# The /more page is still alive but has NO UI entrypoint; Goals,
# Connections, Apple Health, Help, Legal etc. are orphaned there until
# the migration into /settings completes (batches B-E). Until then we
# deeplink to /more so the flow can still verify those sections render.
- openLink: suppr:///more
- waitForAnimationToEnd
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*Account.*"
    timeout: 15000

# Check top-of-screen sections (visible without scroll)
- assertVisible: ".*Goals & Targets.*"
- assertVisible: ".*Daily Targets.*"
- assertVisible: ".*kcal.*"

# Connections section is partway down the screen
- scrollUntilVisible:
    element: ".*Connections.*"
    direction: DOWN
- assertVisible: ".*Connections.*"

# Help link / Export rows live in the App section further down. G-6
# (2026-04-19) replaced the single "Export Data" row with a CSV-primary
# row + JSON-secondary row; pin the primary label here.
- scrollUntilVisible:
    element: ".*Export nutrition log.*"
    direction: DOWN
- assertVisible: ".*Export nutrition log.*"
- assertVisible: ".*Export all data.*"
- assertVisible: ".*Help & Information.*"

# Legal section is near the bottom
- scrollUntilVisible:
    element: ".*Legal.*"
    direction: DOWN
- assertVisible: ".*Legal.*"

# Privacy Policy
- scrollUntilVisible:
    element: ".*Privacy Policy.*"
    direction: DOWN
- assertVisible: ".*Privacy Policy.*"

# Terms
- assertVisible: ".*Terms of Use.*"

# Return to Today so the next flow's launchApp resumes on a tab shell
# rather than persisted /more state.
- tapOn:
    id: "tab-today"
- waitForAnimationToEnd
