appId: com.supprclub.supprapp
name: "Profile & settings — sections, navigation, data export"
---
- runFlow: shared/login.yaml

# Group G IA Batch D (2026-04-30): /more is now a redirect to
# /settings. The bundle owns Goals & targets, Connections, Apple
# Health, Help, Legal — every section this flow used to verify on
# /more renders on /settings now.
- openLink: suppr:///settings
- waitForAnimationToEnd
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Settings"
    timeout: 15000

# Goals & targets section is in the bundle, below Settings's existing
# sections. Scroll until visible.
- scrollUntilVisible:
    element: ".*Goals & targets.*"
    direction: DOWN
- assertVisible: ".*Goals & targets.*"
- assertVisible: ".*Daily targets.*"
- assertVisible: ".*kcal.*"

# Connections section
- scrollUntilVisible:
    element: ".*Connections.*"
    direction: DOWN
- assertVisible: ".*Connections.*"

# Help link / Export rows live in the bundle's App section. G-6
# (2026-04-19) replaced the single "Export Data" row with a
# CSV-primary row + JSON-secondary row.
- scrollUntilVisible:
    element: ".*Export nutrition log.*"
    direction: DOWN
- assertVisible: ".*Export nutrition log.*"
- scrollUntilVisible:
    element: ".*Help & information.*"
    direction: DOWN
- assertVisible: ".*Help & information.*"

# Legal section
- scrollUntilVisible:
    element: ".*Legal.*"
    direction: DOWN
- assertVisible: ".*Legal.*"

- scrollUntilVisible:
    element: ".*Privacy policy.*"
    direction: DOWN
- assertVisible: ".*Privacy policy.*"

- assertVisible: ".*Terms of use.*"

# Return to Today so the next flow's launchApp resumes on a tab shell.
- tapOn:
    id: "tab-today"
- waitForAnimationToEnd
