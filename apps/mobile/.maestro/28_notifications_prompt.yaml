appId: com.supprclub.supprapp
name: "Notifications Prompt — enable/skip flow"
---
# This screen appears after onboarding; we test it in isolation by navigating directly
# Since this is a standalone modal screen, we test its content when visible

- runFlow: shared/login.yaml

# The notifications prompt may appear after onboarding
# If we can navigate to it via deep link or it's visible, test it
- runFlow:
    when:
      visible: ".*Stay on top of your meals.*"
    commands:
      # Verify heading
      - assertVisible: ".*Stay on top of your meals.*"

      # Verify description text
      - assertVisible:
          text: ".*(?:nudge|log meals|meal plan).*"

      # Verify enable button
      - assertVisible: ".*Turn on notifications.*"

      # Verify skip option
      - assertVisible: ".*Skip.*"

      # Tap Skip (don't trigger actual notification permission in tests)
      - tapOn: ".*Skip.*"
      - waitForAnimationToEnd

# If the prompt isn't showing (user already past onboarding), that's fine
- runFlow:
    when:
      notVisible: ".*Stay on top of your meals.*"
    commands:
      - assertVisible: ".*Today.*"
