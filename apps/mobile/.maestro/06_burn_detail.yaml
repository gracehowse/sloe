appId: com.supprclub.supprapp
name: "Burn detail — navigation and content"
---
- runFlow: shared/login.yaml

- tapOn: ".*Today, tab.*"
- waitForAnimationToEnd

# Scroll down to burn card (if Health data exists)
- scrollUntilVisible:
    element: ".*(?:Burn so far|Total burn|Active energy).*"
    direction: DOWN

# If burn card is visible, tap it
- runFlow:
    when:
      visible: ".*(?:Burn so far|Total burn|Active energy).*"
    commands:
      - tapOn: ".*(?:Burn so far|Total burn|Active energy).*"
      # Page title is "Activity Bonus" (today) or "Activity Summary" (past day)
      - assertVisible:
          text: ".*(?:Activity Bonus|Activity Summary).*"
      - assertVisible:
          text: ".*(?:Active energy|Resting energy|Estimated remaining).*"
      # Navigate back
      - tapOn:
          point: "5%,8%"
