appId: com.supprclub.supprapp
name: "Burn detail — navigation and content"
---
- runFlow: shared/login.yaml

- tapOn: ".*Today.*"
- waitForAnimationToEnd

# Scroll down to burn card (if Health data exists)
- scrollUntilVisible:
    element: ".*burned.*"
    direction: DOWN

# If burn card is visible, tap it
- runFlow:
    when:
      visible: ".*burned.*"
    commands:
      - tapOn: ".*burned.*"
      - assertVisible: ".*Calorie Burn.*"
      - assertVisible:
          text: ".*(?:Active energy|Resting energy|Projected).*"
      # Navigate back
      - tapOn:
          point: "5%,8%"
