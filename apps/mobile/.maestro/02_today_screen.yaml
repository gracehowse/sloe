appId: com.supprclub.supprapp
name: "Today screen — ring, macros, quick-log buttons"
---
- runFlow: shared/login.yaml

- tapOn: ".*Today.*"
- waitForAnimationToEnd

# Calorie ring visible
- assertVisible:
    text: ".*(?:LOGGED|kcal).*"

# Macro cards visible (at least one)
- assertVisible:
    text: ".*(?:Protein|Carbs|Fat).*"

# Quick-log buttons visible
- assertVisible: ".*Photo.*"
- assertVisible: ".*Voice.*"
- assertVisible: ".*Search.*"
- assertVisible: ".*Scan.*"

# Verify the macro-toggle affordance is present (in either show or hide state).
- assertVisible:
    text: ".*Tap to (?:show|hide) macros.*"

# Scroll down to verify meal journal section loads
- swipe:
    direction: UP
    duration: 400
- waitForAnimationToEnd

# Scroll back up to verify no crash
- swipe:
    direction: DOWN
    duration: 400
- waitForAnimationToEnd

# Verify Quick-log buttons are functional — tap Voice and verify fallback
- tapOn: ".*Voice.*"
- waitForAnimationToEnd
- assertVisible:
    text: ".*(?:Describe what you ate|Cancel).*"
- tapOn: ".*Cancel.*"
- waitForAnimationToEnd

# Verify Search quick-log opens search
- tapOn: ".*Search.*"
- waitForAnimationToEnd
- assertVisible:
    text: ".*(?:Food search|Search foods).*"
# Go back
- back
- waitForAnimationToEnd
