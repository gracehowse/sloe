# @cases TC-TODAY-01
# @screen (tabs)/index
appId: com.supprclub.supprapp
name: "Today screen — ring, macros, raised tab-bar Log button → LogSheet"
---
- runFlow: shared/login.yaml

- tapOn:
    id: "tab-today"
- waitForAnimationToEnd

# Calorie ring visible — canonical "Today loaded" signal.
# Empty-day shows "Start your day"; populated day shows "LOGGED" or "kcal".
- assertVisible:
    text: ".*(?:LOGGED|kcal|Start your day).*"

# Centered raised Log button — 56pt circular Plus button living in the
# global SupprTabBar between Recipes and Plan (2026-04-30; replaced the
# side LogFab at right:18 / bottom:100). The `today-log-fab` testID was
# intentionally retained so this and the other LogSheet-entry flows
# (22_barcode_scanner, 32_food_search_modal, 33_meal_journal) keep
# matching without YAML edits. Accessibility label remains "Log a meal".
- assertVisible:
    id: "today-log-fab"

# Visual baseline #1 — ring + tab-bar Log button + above-meals state on initial load.
# Catches ring-label clipping, macro-card overflow, raised-button position drift.
# Note: macro tiles (Protein / Carbs / Fat) live below the fold post Top-5 #1
# (2026-04-28); they're verified by the scrolled screenshot below, not by a
# pre-scroll text assertion. The "Tap to show/hide macros" affordance was
# also removed in the same cleanup pass.
- takeScreenshot: screenshots/latest/today-01-loaded

# Scroll until macros are in view (a blind swipe can overshoot on tall screens).
- scrollUntilVisible:
    element:
      text: ".*(?:Protein|Carbs|Fat).*"
    direction: DOWN
    timeout: 10000

# Visual baseline #2 — scrolled state. Macro tiles + meal-slot cards.
- takeScreenshot: screenshots/latest/today-02-scrolled

# Scroll back up to verify no crash
- swipe:
    direction: DOWN
    duration: 400
- waitForAnimationToEnd

# Open LogSheet via the centered raised tab-bar Log button. Search-first
# sheet (Next-10 #12) with right-edge icons for Scan / Voice / Photo
# (Phase 3 / B2.1). The `today-log-fab` testID resolves to the new
# raised tab-bar button (2026-04-30); same effect.
- tapOn:
    id: "today-log-fab"
- waitForAnimationToEnd
# Modal testID can be invisible to Maestro on iOS 26 during the slide
# animation; fall back to the sheet's visible header text.
- assertVisible:
    text: ".*(?:Log a meal|Search foods).*"

# Visual baseline #3 — LogSheet open from the centered raised tab-bar button.
- takeScreenshot: screenshots/latest/today-03-log-sheet

# Voice icon — Pro: voice sheet; Free/Base: in-flow Pro upsell.
# accessibilityLabel is "Voice log" (or "Voice log (Pro)" when locked).
# iOS 26 modal slide animation can invalidate the accessibility tree
# (kAXErrorInvalidUIElement) — wait until the sheet content stabilises.
- extendedWaitUntil:
    visible: ".*(?:Voice log|Search foods).*"
    timeout: 5000
- tapOn:
    text: ".*Voice log.*"
- waitForAnimationToEnd
- runFlow:
    when:
      visible: ".*Voice logging is a Pro feature.*"
    commands:
      # Visual baseline #4a — Pro upsell sheet (Free / Base tier path).
      - takeScreenshot: screenshots/latest/today-04-voice-upsell
      - tapOn: ".*Not now.*"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: ".*Describe what you ate.*"
    commands:
      # Visual baseline #4b — voice sheet (Pro tier path).
      - takeScreenshot: screenshots/latest/today-04-voice-sheet
      # Brief pause — iOS 26 modal transitions can invalidate the
      # accessibility tree momentarily (kAXErrorInvalidUIElement).
      - extendedWaitUntil:
          visible: ".*(?:Describe what you ate|Cancel).*"
          timeout: 5000
      - tapOn: ".*Cancel.*"
      - waitForAnimationToEnd

# Re-open LogSheet (closed when voice path completed) and route to Search.
- tapOn:
    id: "today-log-fab"
- waitForAnimationToEnd
- tapOn:
    text: "Search foods"
- waitForAnimationToEnd
- assertVisible:
    text: ".*(?:Food search|Search foods).*"

# Visual baseline #5 — FoodSearchModal initial state (search field, recent foods).
- takeScreenshot: screenshots/latest/today-05-search-modal
# Go back
- back
- waitForAnimationToEnd
