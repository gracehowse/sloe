# @cases TC-TODAY-01
# @screen (tabs)/index
appId: com.supprclub.supprapp
name: "Today screen — ring, macros, quick-log buttons"
---
- runFlow: shared/login.yaml

- tapOn: ".*Today, tab.*"
- waitForAnimationToEnd

# Calorie ring visible
- assertVisible:
    text: ".*(?:LOGGED|kcal).*"

# Macro cards visible (at least one)
- assertVisible:
    text: ".*(?:Protein|Carbs|Fat).*"

# Quick-log strip — labels are Search / Voice / Snap / Scan (Snap = photo log).
- assertVisible: ".*Snap.*"
- assertVisible: ".*Voice.*"
- assertVisible: ".*Search.*"
- assertVisible: ".*Scan.*"

# Visual baseline #1 — ring + macros + quick-log in their default state.
# Catches ring-label clipping, macro-card overflow, quick-log icon misalignment.
- takeScreenshot: screenshots/latest/today-01-loaded

# Verify the macro-toggle affordance is present (in either show or hide state).
- assertVisible:
    text: ".*Tap to (?:show|hide) macros.*"

# Scroll down to verify meal journal section loads
- swipe:
    direction: UP
    duration: 400
- waitForAnimationToEnd

# Visual baseline #2 — scrolled state. Header collapse + meal-slot cards.
- takeScreenshot: screenshots/latest/today-02-scrolled

# Scroll back up to verify no crash
- swipe:
    direction: DOWN
    duration: 400
- waitForAnimationToEnd

# Voice — Pro: voice sheet; Free/Base: in-flow Pro upsell (tap Not now).
- tapOn:
    id: "today-quick-log-voice"
- waitForAnimationToEnd
- runFlow:
    when:
      visible: ".*Voice logging is a Pro feature.*"
    commands:
      # Visual baseline #3a — Pro upsell sheet (Free / Base tier path).
      - takeScreenshot: screenshots/latest/today-03-voice-upsell
      - tapOn: ".*Not now.*"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: ".*Describe what you ate.*"
    commands:
      # Visual baseline #3b — voice sheet (Pro tier path).
      - takeScreenshot: screenshots/latest/today-03-voice-sheet
      - assertVisible:
          text: ".*(?:Describe what you ate|Cancel).*"
      - tapOn: ".*Cancel.*"
      - waitForAnimationToEnd

# Search quick-log opens food search modal
- tapOn:
    id: "today-quick-log-search"
- waitForAnimationToEnd
- assertVisible:
    text: ".*(?:Food search|Search foods).*"
# Visual baseline #4 — food search modal initial state (search field, recent foods).
- takeScreenshot: screenshots/latest/today-04-search-modal
# Go back
- back
- waitForAnimationToEnd
