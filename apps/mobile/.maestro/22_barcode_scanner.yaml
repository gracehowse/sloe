# @cases TC-BARCODE-01
# @screen barcode scanner
appId: com.supprclub.supprapp
name: "Barcode Scanner — permission screen, UI elements"
---
- runFlow: shared/login.yaml

- tapOn:
    id: "tab-today"
- waitForAnimationToEnd

# Quick-log strip retired 2026-04-27 (Phase 3 / B2.1). Entry is now:
# LogFab → LogSheet opens → tap "Scan barcode" right-edge icon. The FAB has
# accessibilityLabel "Log a meal"; the scan icon has accessibilityLabel
# "Scan barcode". (See LogFab.tsx + LogSheet.tsx.)
- tapOn:
    id: "today-log-fab"
- waitForAnimationToEnd
- waitForAnimationToEnd
# Use the visible header text — testIDs inside RN Modals are unreliable
# in Maestro's iOS 26 accessibility traversal until the modal animation
# fully settles. See LogSheet.tsx:262 for the "Log a meal" header.
- assertVisible:
    text: "^Log a meal$"
- tapOn:
    text: "Scan barcode"
- waitForAnimationToEnd

# The barcode screen should show either:
# 1. Camera permission prompt (most likely in test env)
# 2. The scanner UI with "Barcode Scanner" title

# Check for permission prompt first
- runFlow:
    when:
      visible: ".*Grant Permission.*"
    commands:
      - assertVisible: ".*camera.*"
      - assertVisible: ".*Grant Permission.*"

# If scanner loaded directly (permissions already granted), verify UI
- runFlow:
    when:
      visible: ".*Barcode Scanner.*"
    commands:
      - assertVisible: ".*Barcode Scanner.*"
      - assertVisible: ".*Point at a product barcode.*"

# Navigate back to Today
- tapOn:
    id: "tab-today"
- waitForAnimationToEnd
