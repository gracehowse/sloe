# @cases TC-BARCODE-01
# @screen barcode scanner
appId: com.supprclub.supprapp
name: "Barcode Scanner — permission screen, UI elements"
---
- runFlow: shared/login.yaml

- tapOn: ".*Today, tab.*"
- waitForAnimationToEnd

- tapOn:
    id: "today-quick-log-scan"
- waitForAnimationToEnd

# The barcode screen should show either:
# 1. Camera permission prompt (most likely in test env)
# 2. The scanner UI with "Barcode Scanner" title

# Check for permission prompt first
- runFlow:
    when:
      visible: ".*Grant Permission.*"
    commands:
      - assertVisible: ".*camera.*"
      - assertVisible: ".*Grant Permission.*"

# If scanner loaded directly (permissions already granted), verify UI
- runFlow:
    when:
      visible: ".*Barcode Scanner.*"
    commands:
      - assertVisible: ".*Barcode Scanner.*"
      - assertVisible: ".*Point at a product barcode.*"

# Navigate back to Today
- tapOn: ".*Today, tab.*"
- waitForAnimationToEnd
