# @cases TC-JOURNAL-01
# @screen (tabs)/index
appId: com.supprclub.supprapp
name: "Meal journal — day strip, logged meals, long-press actions"
---
- runFlow: shared/login.yaml

- tapOn:
    id: "tab-today"
- waitForAnimationToEnd

# Verify calorie ring is present
- assertVisible:
    text: ".*(?:LOGGED|kcal).*"

# Verify the day strip / date navigation is present
- assertVisible:
    text: ".*(?:Today|Mon|Tue|Wed|Thu|Fri|Sat|Sun).*"

# Visual baseline #1 — day-strip + ring + StreakPip header.
- takeScreenshot: screenshots/latest/journal-01-day-strip

# Scroll down to journal section
- swipe:
    direction: UP
    duration: 400
- waitForAnimationToEnd

# Check for meal slots (Breakfast, Lunch, Dinner, Snack)
- assertVisible:
    text: ".*(?:Breakfast|Lunch|Dinner|Snack|No meals logged|Add food).*"

# Visual baseline #2 — meal-slot section. Either filled cards or empty state.
- takeScreenshot: screenshots/latest/journal-02-meals-section

# If meals are logged, verify meal card content
- runFlow:
    when:
      visible: ".*(?:Breakfast|Lunch|Dinner).*"
    commands:
      # Meal cards should show recipe name or food name
      - assertVisible:
          text: ".*(?:kcal|cal|P |C |F ).*"

# Test the log food button (+) if visible
- runFlow:
    when:
      visible: ".*(?:Log food|Add food).*"
    commands:
      - tapOn:
          text: ".*(?:Log food|Add food).*"
          index: 0
      - waitForAnimationToEnd
      # Should open food logging modal/sheet
      - assertVisible:
          text: ".*(?:Search|Voice|Snap|Scan|Log|food).*"
      # Visual baseline #3 — LogSheet open from journal Add-food entry point.
      # Catches sheet-handle, sub-tab pill alignment, FAB-vs-sheet z-index issues.
      - takeScreenshot: screenshots/latest/journal-03-log-sheet
      # Dismiss
      - runFlow:
          when:
            visible: ".*(?:Cancel|Dismiss|Close).*"
          commands:
            - tapOn:
                text: ".*(?:Cancel|Dismiss|Close).*"
                index: 0
            - waitForAnimationToEnd

      - runFlow:
          when:
            notVisible: ".*(?:Cancel|Dismiss|Close).*"
          commands:
            - back
            - waitForAnimationToEnd

# Scroll back up
- swipe:
    direction: DOWN
    duration: 400
- waitForAnimationToEnd

# LogFab — persistent 56pt circular Log button (Phase 2 / B1.2). Replaces
# the legacy quick-log strip retired 2026-04-27 (Phase 3 / B2.1).
- assertVisible:
    id: "today-log-fab"
