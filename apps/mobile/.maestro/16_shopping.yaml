# @cases TC-SHOP-01
# @screen shopping list (from planner)
appId: com.supprclub.supprapp
name: "Shopping list — items, check off, share"
---
- runFlow: shared/login.yaml

- tapOn: ".*Plan, tab.*"
- waitForAnimationToEnd

# Same tab as meal plan; list CTA is often below the first screenful
- scrollUntilVisible:
    element: ".*Shopping List.*"
    direction: DOWN

# Shopping List button should be visible after a plan is generated
- runFlow:
    when:
      visible: ".*Shopping List.*"
    commands:
      - tapOn: ".*Shopping List.*"
      - waitForAnimationToEnd

      # Should see Shopping List header
      - assertVisible: ".*Shopping List.*"

      # If items exist, verify list structure
      - runFlow:
          when:
            visible: ".*✓.*"
          commands:
            - assertVisible: ".*✓.*"

      # If empty, verify empty state
      - runFlow:
          when:
            visible: ".*No items.*"
          commands:
            - assertVisible: ".*No items.*"

      # Navigate back
      - tapOn:
          point: "5%,8%"
