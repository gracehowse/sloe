# @cases TC-SHOP-01
# @screen shopping list (from planner)
appId: com.supprclub.supprapp
name: "Shopping list — items, check off, share"
---
- runFlow: shared/login.yaml

- tapOn:
    id: "tab-plan"
- waitForAnimationToEnd

# Shopping is now a sub-tab inside Plan (not a separate screen).
- tapOn: ".*Shopping.*"
- waitForAnimationToEnd

# Should see Shopping content — items or empty state.
- runFlow:
    when:
      visible: ".*(?:No items|shopping list is empty|Add meals).*"
    commands:
      - assertVisible: ".*(?:No items|shopping list is empty|Add meals).*"

- runFlow:
    when:
      visible: ".*(?:Produce|Dairy|Meat|Pantry|Baking|Frozen|check).*"
    commands:
      - assertVisible: ".*(?:Produce|Dairy|Meat|Pantry|Baking|Frozen|check).*"

# Switch back to This week
- tapOn: ".*This week.*"
- waitForAnimationToEnd
