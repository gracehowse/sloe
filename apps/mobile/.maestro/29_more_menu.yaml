# @cases TC-MORE-01
# @screen (tabs)/settings
appId: com.supprclub.supprapp
name: "Settings hub — full settings verification, sign out, danger zone"
---
- runFlow: shared/login.yaml

# Group G IA Batch D (2026-04-30): /more is now a redirect to /settings.
# Deeplinking to either resolves to /settings; we point at /settings
# directly so the flow's intent is unambiguous. The bundle owns
# Membership, Goals & targets, Connections, Recipes, Legal, Build,
# and Danger zone — the same surfaces this flow used to verify on
# /more.
- openLink: suppr:///settings
- waitForAnimationToEnd
- waitForAnimationToEnd

# Confirm we're on Settings — the page title renders at the top.
- extendedWaitUntil:
    visible: "Settings"
    timeout: 15000

# Verify the profile header card / tier strip renders (Free/Pro
# tier label appears in either the existing Plan section or the
# bundle's profile card).
- assertVisible:
    text: ".*(?:Free|Pro|Base).*"

# Scroll down past Settings's existing sections (Plan, Appearance,
# Account, Body & activity, Journal display, Notifications, Tracking
# extras, About, Data) to reach the bundle.
- scrollUntilVisible:
    element: ".*Recipes.*"
    direction: DOWN
- assertVisible: ".*Recipes.*"
- assertVisible: ".*Streak.*"

# Verify Goals & targets bundle section
- scrollUntilVisible:
    element: ".*Goals & targets.*"
    direction: DOWN
- assertVisible: ".*Goals & targets.*"
- assertVisible: ".*Daily targets.*"
- assertVisible: ".*Dashboard widgets.*"
- assertVisible: ".*Week starts on.*"

# Connections section
- scrollUntilVisible:
    element: ".*Connections.*"
    direction: DOWN
- assertVisible: ".*Connections.*"
- assertVisible: ".*Apple Health.*"

# Recipes section (bundle's "Create recipe" row)
- scrollUntilVisible:
    element: ".*Create recipe.*"
    direction: DOWN
- assertVisible: ".*Create recipe.*"

# Bundle's App section + Legal section
- scrollUntilVisible:
    element: ".*Help & information.*"
    direction: DOWN
- assertVisible: ".*Export nutrition log.*"
- assertVisible: ".*Help & information.*"

- scrollUntilVisible:
    element: ".*Legal.*"
    direction: DOWN
- assertVisible: ".*Privacy policy.*"
- assertVisible: ".*Terms of use.*"

# Danger zone — the M15/M16 fix split the modal stack into two rows:
# "Reset or erase data" (modal) and a separate "Delete my account"
# row with a typed-confirm flow.
- scrollUntilVisible:
    element: ".*Danger zone.*"
    direction: DOWN
- assertVisible: ".*Danger zone.*"
- assertVisible: ".*Reset or erase data.*"
- assertVisible: ".*Delete my account.*"

# Sign Out button (bundle renders it beneath the danger zone card).
- scrollUntilVisible:
    element: "Sign Out"
    direction: DOWN
- assertVisible: "Sign Out"

# Test Dashboard widgets picker
- scrollUntilVisible:
    element: ".*Dashboard widgets.*"
    direction: UP
- tapOn: ".*Dashboard widgets.*"
- waitForAnimationToEnd
- assertVisible: ".*Protein.*"
- assertVisible: ".*Carbs.*"
- assertVisible: ".*Fat.*"
- assertVisible: ".*Fiber.*"
- assertVisible: ".*Done.*"
- tapOn: ".*Done.*"
- waitForAnimationToEnd

# Test Week Start Day picker
- tapOn: ".*Week starts on.*"
- waitForAnimationToEnd
- assertVisible: ".*Monday.*"
- assertVisible: ".*Sunday.*"
# Tap current selection to dismiss
- tapOn: ".*Monday.*"
- waitForAnimationToEnd

# Test reset/erase modal opens
- scrollUntilVisible:
    element: ".*Reset or erase data.*"
    direction: DOWN
- tapOn: ".*Reset or erase data.*"
- waitForAnimationToEnd
- assertVisible: ".*Reset or start over.*"
- assertVisible: ".*Reset Plan \\(Keep My Data\\).*"
- assertVisible: ".*Erase all app data.*"
- assertVisible: ".*Cancel.*"
# Dismiss
- tapOn: ".*Cancel.*"
- waitForAnimationToEnd

# Verify upgrade banner for free users
- scrollUntilVisible:
    element: ".*Goals & targets.*"
    direction: UP
- runFlow:
    when:
      visible: ".*Upgrade your plan.*"
    commands:
      - assertVisible: ".*Upgrade your plan.*"
      - assertVisible: ".*Unlimited recipes.*"

# Return to Today so the next flow's launchApp resumes on a tab shell.
- tapOn:
    id: "tab-today"
- waitForAnimationToEnd
