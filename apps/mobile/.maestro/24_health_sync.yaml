appId: com.supprclub.supprapp
name: "Health Sync — screen layout, feature list, connect button"
---
- runFlow: shared/login.yaml

# PRODUCT GAP (2026-04-29): Apple Health row lives in /more's
# Connections section, but /more is UI-orphaned post Group G IA
# collapse (no More pill, redirect to /settings not yet wired).
# Apple Health setup is currently unreachable from any tap path —
# only deeplink. Flagged for product fix; deeplink here keeps coverage.
- openLink: suppr:///more
- waitForAnimationToEnd
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*Account.*"
    timeout: 15000

# Navigate to Health Sync via Apple Health row in Connections
- scrollUntilVisible:
    element: ".*Apple Health.*"
    direction: DOWN
- tapOn: ".*Apple Health.*"
- waitForAnimationToEnd

# Verify screen title
- assertVisible: ".*Health Sync.*"

# Verify the Apple Health / Health Connect card
- assertVisible: ".*Apple Health.*"

# Verify feature list items
- assertVisible: ".*Daily step count.*"
- assertVisible: ".*Weight measurements.*"
- assertVisible: ".*Active energy burned.*"
- scrollUntilVisible:
    element: ".*Resting energy burned.*"
    direction: DOWN
- assertVisible: ".*Resting energy burned.*"
- assertVisible: ".*Workouts.*"

# Verify Nutrition Sync card
- scrollUntilVisible:
    element: ".*Nutrition Sync.*"
    direction: DOWN
- assertVisible: ".*Nutrition Sync.*"
- assertVisible: ".*Import meals from Health.*"
- assertVisible: ".*Share meals to Health.*"

# Verify "Clear all imported data" destructive action
- scrollUntilVisible:
    element: ".*Clear all imported data.*"
    direction: DOWN
- assertVisible: ".*Clear all imported data.*"

# Verify Connect button OR Expo Go warning
- runFlow:
    when:
      visible: ".*Connect Health Data.*"
    commands:
      - assertVisible: ".*Connect Health Data.*"

- runFlow:
    when:
      visible: ".*Apple Health isn't available.*"
    commands:
      - assertVisible: ".*Apple Health isn't available.*"

# Go back
- back
- waitForAnimationToEnd

# Return to Today so the next flow's launchApp resumes on a tab shell.
- tapOn:
    id: "tab-today"
- waitForAnimationToEnd
