appId: com.supprclub.supprapp
name: "Create Recipe — form fields, ingredient add, totals, validation"
---
- runFlow: shared/login.yaml

- tapOn: ".*More, tab.*"
- waitForAnimationToEnd

# Navigate to Create Recipe via the settings row
- scrollUntilVisible:
    element: ".*Create Recipe.*"
    direction: DOWN
- tapOn: ".*Create Recipe.*"
- waitForAnimationToEnd

# Verify screen header
- assertVisible: ".*CREATE.*"

# Verify Cancel button
- assertVisible: ".*Cancel.*"

# Verify image placeholder
- assertVisible: ".*Add photo.*"

# Verify form fields are present
- assertVisible: ".*Recipe name.*"
- assertVisible: ".*Servings.*"
- assertVisible: ".*Ingredients.*"

# Bulk paste entry (opens modal — no API dependency; cancel out)
- scrollUntilVisible:
    element: ".*Paste list.*"
    direction: DOWN
- tapOn: ".*Paste list.*"
- waitForAnimationToEnd
- assertVisible: ".*Paste ingredient list.*"
- assertVisible: ".*Match.*"
- tapOn: ".*Close.*"
- waitForAnimationToEnd

# Verify the Add ingredient button is visible
- scrollUntilVisible:
    element: ".*Add ingredient.*"
    direction: DOWN
- assertVisible: ".*Add ingredient.*"

# Verify Save button is visible at the bottom
- assertVisible: ".*Save Recipe.*"

# Verify instructions field exists
- scrollUntilVisible:
    element: ".*Instructions (optional).*"
    direction: DOWN
- assertVisible: ".*Instructions (optional).*"

# Verify publish toggle
- scrollUntilVisible:
    element: ".*Publish to community.*"
    direction: DOWN
- assertVisible: ".*Publish to community.*"

# Verify meal type picker is present
- assertVisible:
    text: ".*MEAL TYPE.*"

# Fill in a recipe name
- scrollUntilVisible:
    element: ".*Recipe name.*"
    direction: UP
- tapOn:
    text: ".*e.g. Chicken stir-fry.*"
- inputText: "Test Recipe"

# Tap Add ingredient to open food search modal
- scrollUntilVisible:
    element: ".*Add ingredient.*"
    direction: DOWN
- tapOn: ".*Add ingredient.*"
- waitForAnimationToEnd

# Food search modal should open
- assertVisible:
    text: ".*(?:Search|food|ingredient).*"

# Close the search modal
- tapOn: ".*Cancel.*"
- waitForAnimationToEnd

# Cancel creation — go back
- tapOn: ".*Cancel.*"
- waitForAnimationToEnd
