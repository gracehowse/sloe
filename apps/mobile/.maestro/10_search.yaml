# @cases TC-SEARCH-01
# @screen FoodSearchModal (opened from Today)
# The `(tabs)/search` route is hidden from the tab bar; primary food search is the modal from Today.
appId: com.supprclub.supprapp
name: "Food search — open from Today, query USDA/OpenFood, error path"
---
- runFlow: shared/login.yaml

- tapOn: ".*Today, tab.*"
- waitForAnimationToEnd

- tapOn:
    id: "today-quick-log-search"
- waitForAnimationToEnd

- assertVisible: ".*Food search.*"
- assertVisible: ".*Search foods and log portions.*"

- tapOn:
    text: ".*(?:Search foods|Search).*"
    index: 0
- inputText: "oats"
- waitForAnimationToEnd

- runFlow:
    when:
      visible:
        id: "food-search-submit"
    commands:
      - tapOn:
          id: "food-search-submit"

- runFlow:
    when:
      notVisible:
        id: "food-search-submit"
    commands:
      - pressKey: Enter

- waitForAnimationToEnd
- waitForAnimationToEnd

# Results, partial match, or explicit unavailable copy
- runFlow:
    when:
      visible: ".*(?:FDC|OFF|oats|Oat|kcal|cal|Calories).*"
    commands:
      - assertVisible:
          text: ".*(?:kcal|cal|Calories|FDC|OFF).*"

- runFlow:
    when:
      visible: ".*Food search isn't available.*"
    commands:
      - assertVisible: ".*Food search isn't available.*"

- back
- waitForAnimationToEnd

- assertVisible:
    text: ".*(?:LOGGED|kcal).*"
