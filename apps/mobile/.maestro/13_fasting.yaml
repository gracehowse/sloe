appId: com.supprclub.supprapp
name: "Fasting — timer ring, start/end, history"
---
- runFlow: shared/login.yaml

# PRODUCT GAP (flagged 2026-04-29): Fasting screen has no entrypoint
# from More or Settings after the IA 6→4 collapse. The only in-product
# path is the TodayFastingPill in the unified context block on Today,
# which only renders when a fast is *already active*. Until a stable
# entrypoint is restored, navigate via deeplink so this flow can still
# verify the fasting screen renders correctly.
- openLink: suppr:///fasting
- waitForAnimationToEnd
- waitForAnimationToEnd

# Header
- assertVisible: ".*Intermittent Fasting.*"

# Timer ring area — should show current state
- assertVisible:
    text: ".*(?:Ready when you are|FASTING|FAST COMPLETE).*"

# Window label (e.g., 16:8)
- assertVisible:
    text: ".*(?:16:8|18:6|20:4).*"

# Start/End button
- assertVisible:
    text: ".*(?:Start Fast|End Fast|Complete Fast).*"

# If not fasting, start a fast
- runFlow:
    when:
      visible: ".*Start Fast.*"
    commands:
      - tapOn: ".*Start Fast.*"
      - waitForAnimationToEnd
      - assertVisible: ".*FASTING.*"
      - assertVisible: ".*End Fast.*"

      # End the fast immediately
      - tapOn: ".*End Fast.*"
      - waitForAnimationToEnd
      - assertVisible: ".*Start Fast.*"

# History section (if any completed sessions)
- scrollUntilVisible:
    element: ".*History.*"
    direction: DOWN

# Return to Today so the next flow's launchApp resumes on a tab shell
# rather than persisted /fasting state. Coordinate-based back tap was
# unreliable when the route was outside the tab shell.
- tapOn:
    id: "tab-today"
- waitForAnimationToEnd
