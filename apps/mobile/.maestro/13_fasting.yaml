appId: com.supprclub.supprapp
name: "Fasting — timer ring, start/end, history"
---
- runFlow: shared/login.yaml

# PRODUCT GAP CLOSED (2026-05-02, `claude/fasting-findable-urgent`):
# The Fasting screen now has a stable entrypoint from Settings →
# Goals & targets → "Intermittent fasting" (testID
# `settings-bundle-fasting-row`), AND the Settings search index
# resolves "fast" / "fasting" / "intermittent" to the same row.
# Deeplink stays the canonical Maestro entrypoint for this suite
# because (a) it's faster and (b) the sub-screen renders the same
# regardless of how the user got there. The Settings entry path is
# pinned by `settingsFastingFindable.test.ts` instead.
- openLink: suppr:///fasting
- waitForAnimationToEnd
- waitForAnimationToEnd

# Header (Sloe 305:2 — plum serif "Fasting")
- assertVisible: ".*Fasting.*"

# Timer ring area — should show current state. Idle keeps the
# "Ready when you are" sub-label; active shows the live elapsed +
# stage chip + "Hold to end fast"; complete shows "Complete fast".
- assertVisible:
    text: ".*(?:Ready when you are|Hold to end fast|Complete fast).*"

# Window label (e.g., 16:8) or OMAD preset pill (idle state only)
- runFlow:
    when:
      visible: ".*Ready when you are.*"
    commands:
      - assertVisible:
          text: ".*(?:16:8|18:6|20:4|14:10|OMAD).*"

# If not fasting, start a fast (Sloe lower-case "Start fast")
- runFlow:
    when:
      visible: ".*Start fast.*"
    commands:
      - tapOn: ".*Start fast.*"
      - waitForAnimationToEnd
      - assertVisible: ".*Hold to end fast.*"

      # End the fast immediately (long-press to confirm)
      - longPressOn: ".*Hold to end fast.*"
      - waitForAnimationToEnd
      - assertVisible: ".*Start fast.*"

# History section (if any completed sessions)
- scrollUntilVisible:
    element: ".*RECENT FASTS.*"
    direction: DOWN

# Return to Today so the next flow's launchApp resumes on a tab shell
# rather than persisted /fasting state. Coordinate-based back tap was
# unreliable when the route was outside the tab shell.
- tapOn:
    id: "tab-today"
- waitForAnimationToEnd
