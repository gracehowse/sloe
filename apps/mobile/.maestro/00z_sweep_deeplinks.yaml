# Deep-route visual baseline — feeds mobile screenshot diff (`screenshots/latest/`).
# Also writes audit copies under docs/audits/visual-sweep-expanded/ for human review packs.
#
# Run: npm run mobile:test:sweep:deeplinks
# Diff: npm run mobile:test:screens:diff
appId: com.supprclub.supprapp
name: "Sweep — deep routes (deeplink baseline)"
---
- runFlow: shared/login.yaml

- tapOn:
    id: "tab-today"
- waitForAnimationToEnd

# Log sheet
- tapOn:
    id: "today-log-fab"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*(?:Log a meal|Search foods).*"
    timeout: 8000
- takeScreenshot: screenshots/latest/deeplink-log-sheet
- takeScreenshot: ../../docs/audits/visual-sweep-expanded/51-log-sheet
- back
- waitForAnimationToEnd

- openLink: suppr:///targets
- extendedWaitUntil:
