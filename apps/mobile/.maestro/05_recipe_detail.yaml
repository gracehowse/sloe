appId: com.supprclub.supprapp
name: "Recipe detail — ingredients, nutrition, portions, cook, log"
---
- runFlow: shared/login.yaml

- tapOn:
    id: "tab-recipes"
- waitForAnimationToEnd
- waitForAnimationToEnd

# Wait for recipe grid to load (cards show "kcal")
- extendedWaitUntil:
    visible: ".*kcal.*"
    timeout: 30000

# Tap into a recipe card by tapping a card area below the header.
# 25%,40% lands inside the first column of the 2-col grid.
- tapOn:
    point: "25%,40%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# Recipe detail should show key sections (Servings appears in header info bar,
# Ingredients is the default tab title)
- extendedWaitUntil:
    visible: ".*(?:Ingredients|Servings).*"
    timeout: 15000

# Should see macros
- assertVisible:
    text: ".*(?:kcal|Protein|Carbs|Fat).*"

# Should see Start Cooking button
- assertVisible: ".*Start Cooking.*"

# Should see Log to journal section
- scrollUntilVisible:
    element: ".*Log to journal.*"
    direction: DOWN
- assertVisible: ".*Log to journal.*"

# Portion buttons should be visible
- assertVisible: ".*1×.*"

# Test portion adjustment — tap 2× if visible
- runFlow:
    when:
      visible: ".*2×.*"
    commands:
      - tapOn: ".*2×.*"
      - waitForAnimationToEnd
      # Macros should still be visible (doubled)
      - assertVisible: ".*kcal.*"
      # Reset to 1×
      - tapOn: ".*1×.*"

# Scroll back up to verify recipe title area
- scrollUntilVisible:
    element: ".*Ingredients.*"
    direction: UP

# Verify save/unsave button exists
- assertVisible:
    text: ".*(?:Save|Saved|Unsave).*"

# Navigate back
- tapOn:
    point: "5%,8%"
