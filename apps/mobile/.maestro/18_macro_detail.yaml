appId: com.supprclub.supprapp
name: "Macro detail — breakdown by meal"
---
- runFlow: shared/login.yaml

- tapOn:
    id: "tab-today"
- waitForAnimationToEnd

# Tap on a macro card (Protein, Carbs, or Fat)
- runFlow:
    when:
      visible: ".*Protein.*"
    commands:
      - tapOn: ".*Protein.*"
      - waitForAnimationToEnd

      # Should see macro detail screen
      - assertVisible: ".*Protein.*"

      # Visual baseline — macro detail page.
      - takeScreenshot: screenshots/latest/macro-detail-01-protein

      # If meals are logged, should show per-meal breakdown
      - runFlow:
          when:
            visible: ".*kcal.*"
          commands:
            - assertVisible: ".*kcal.*"

      # Navigate back
      - tapOn:
          point: "5%,8%"
