appId: com.supprclub.supprapp
name: "Ensure authenticated + app on canonical tab shell"
---
# Two ways to reach the main tabs:
#
# A) Auto sign-in: AuthProvider calls signInWithPassword when the **bundled** env has
#    EXPO_PUBLIC_E2E_AUTH_ENABLED=true plus EXPO_PUBLIC_E2E_EMAIL / EXPO_PUBLIC_E2E_PASSWORD
#    (set in apps/mobile/.env before `expo run:ios` or present when Metro bundles).
#
# B) UI sign-in (this file): If the login form is visible, Maestro fills **E2E_EMAIL** /
#    **E2E_PASSWORD** from `run-maestro-e2e.mjs` (-e flags). You should see taps/typing
#    on the simulator when auto sign-in is not active.
#
# Test user must have profiles.onboarding_completed=true or flows will never see "Today".

# Force a fresh app launch at the start of every flow. Without this, suite
# state pollutes between flows: a previous flow may leave the app on a deep
# route / modal, the next flow's `extendedWaitUntil .*Today.*` matches stale
# text (e.g. a date-strip "Today" or "TODAY" in the calorie ring), and the
# subsequent `tab-*` testID lookup fails because the user isn't actually on
# the tab shell. Adds ~3s per flow but produces deterministic state.
#
# NOTE (2026-04-29): tried following launchApp with `openLink: suppr:///`
# to force navigation back to root (Expo Router persists nav state and
# can resume on /fasting after a deeplink-leaving flow). That broke
# every flow — the empty-path URL caused the bundle to lose focus or
# never finish loading. Reverted; deeplink-using flows must navigate
# back to a tab shell themselves before they end.
- launchApp:
    appId: com.supprclub.supprapp

- runFlow:
    when:
      visible:
        id: "login-email"
    commands:
      - tapOn:
          id: "login-email"
          retryTapIfNoChange: true
      - eraseText: 80
      - inputText: ${E2E_EMAIL}
      - tapOn:
          id: "login-password"
          retryTapIfNoChange: true
      - eraseText: 80
      - inputText: ${E2E_PASSWORD}
      - tapOn:
          point: "50%,12%"
      - waitForAnimationToEnd
      - tapOn:
          id: "login-submit"
          retryTapIfNoChange: true
      - waitForAnimationToEnd
      - waitForAnimationToEnd
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible: ".*(?:Today, tab|Today|LOGGED).*"
    timeout: 120000

- runFlow:
    when:
      visible: ".*Not Now.*"
    commands:
      - tapOn: ".*Not Now.*"
      - waitForAnimationToEnd
