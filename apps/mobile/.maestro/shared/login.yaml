appId: com.supprclub.supprapp
name: "Launch app and login with test account"
---
# Launch native Suppr build. clearState: false keeps auth session
# so the app skips login on subsequent flows.
- launchApp:
    clearState: false

# Wait for the app to load past the auth spinner.
# The auth provider has a 10s timeout so this should resolve.
- extendedWaitUntil:
    visible: ".*(?:Sign In|Today).*"
    timeout: 30000

# If already authenticated (tab bar visible), navigate to Today
- runFlow:
    when:
      visible: ".*Today.*"
    commands:
      - tapOn: ".*Today.*"

# If on login screen, sign in with test account
- runFlow:
    when:
      visible: ".*Sign In.*"
    commands:
      - tapOn:
          id: "login-email"
          retryTapIfNoChange: true
      - waitForAnimationToEnd
      - waitForAnimationToEnd
      - inputText: ${E2E_EMAIL}
      - waitForAnimationToEnd

      - tapOn:
          id: "login-password"
          retryTapIfNoChange: true
      - waitForAnimationToEnd
      - waitForAnimationToEnd
      - inputText: ${E2E_PASSWORD}
      - waitForAnimationToEnd

      # Submit via keyboard return key
      - pressKey: Enter

      - extendedWaitUntil:
          visible: ".*(?:Today|LOGGED|Enter your|What should we call you|Welcome|No account|reach the server|Not Now|Save Password).*"
          timeout: 45000

      # Dismiss iOS "Save Password?" dialog
      - runFlow:
          when:
            visible: ".*Not Now.*"
          commands:
            - tapOn: ".*Not Now.*"
            - waitForAnimationToEnd

# Dismiss any remaining system dialog
- runFlow:
    when:
      visible: ".*Not Now.*"
    commands:
      - tapOn: ".*Not Now.*"
      - waitForAnimationToEnd
