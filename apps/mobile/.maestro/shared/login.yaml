appId: com.supprclub.supprapp
name: "Ensure authenticated (assumes app is already running)"
---
# The auth provider auto-signs in at startup when EXPO_PUBLIC_E2E_AUTH_ENABLED=true
# is baked into the build. Flows using this helper never interact with the login
# form — see 30_login_auth.yaml for the only flow that tests login UI directly.
#
# Required build-time env (in apps/mobile/.env when running E2E):
#   EXPO_PUBLIC_E2E_AUTH_ENABLED=true
#   EXPO_PUBLIC_E2E_EMAIL=<test account>
#   EXPO_PUBLIC_E2E_PASSWORD=<test password>
#
# IMPORTANT: launch the app once before running the suite via:
#   xcrun simctl launch booted com.supprclub.supprapp
# Maestro's own launchApp under XCUITest stalls the Expo Release build, so
# this helper does NOT relaunch — it just verifies authenticated state.

- extendedWaitUntil:
    visible: ".*Today.*"
    timeout: 60000

- runFlow:
    when:
      visible: ".*Not Now.*"
    commands:
      - tapOn: ".*Not Now.*"
      - waitForAnimationToEnd
