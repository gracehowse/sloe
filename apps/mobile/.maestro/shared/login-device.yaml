appId: com.supprclub.supprapp
name: "Launch native app and login with test account (physical device)"
---
# For physical device with native Suppr build (not Expo Go)
- launchApp:
    clearState: false

# Wait for the app to load — Sign In or Today (no Expo Go dev menu on native builds)
- extendedWaitUntil:
    visible: "Sign In|Today"
    timeout: 30000

# If already authenticated (tab bar visible), done
- runFlow:
    when:
      visible: "Today"
    commands:
      - tapOn: "Today"

# If on login screen, sign in with test account
- runFlow:
    when:
      visible: "Sign In"
    commands:
      - tapOn:
          id: "login-email"
          retryTapIfNoChange: true
      - waitForAnimationToEnd
      - inputText: ${E2E_EMAIL}
      - waitForAnimationToEnd

      - tapOn:
          id: "login-password"
          retryTapIfNoChange: true
      - waitForAnimationToEnd
      - inputText: ${E2E_PASSWORD}
      - waitForAnimationToEnd

      - tapOn: "Sign In"
      - extendedWaitUntil:
          visible: "Today|Enter your|No account|reach the server|Not Now|Save Password"
          timeout: 30000

      # Dismiss iOS "Save Password?" dialog
      - runFlow:
          when:
            visible: "Not Now"
          commands:
            - tapOn: "Not Now"
            - waitForAnimationToEnd

# Dismiss any remaining system dialog
- runFlow:
    when:
      visible: "Not Now"
    commands:
      - tapOn: "Not Now"
      - waitForAnimationToEnd
