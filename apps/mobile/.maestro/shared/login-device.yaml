appId: com.supprclub.supprapp
name: "Launch native app and ensure authenticated (physical device)"
---
# Auth bypass lives in AuthProvider (context/auth.tsx). Requires the build to
# include EXPO_PUBLIC_E2E_AUTH_ENABLED=true + EXPO_PUBLIC_E2E_EMAIL/PASSWORD.
# Build must embed the JS bundle (no --no-bundler) so the app runs without Metro.
- launchApp:
    clearState: false
    stopApp: true

- extendedWaitUntil:
    visible: ".*Today.*"
    timeout: 90000

- runFlow:
    when:
      visible: ".*Not Now.*"
    commands:
      - tapOn: ".*Not Now.*"
      - waitForAnimationToEnd
