appId: host.exp.Exponent
name: "Create test account"
---
- launchApp
- openLink: ${EXPO_DEV_SERVER_URL}

- runFlow:
    when:
      visible: "Recently opened"
    commands:
      - tapOn: "Suppr"

- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Today"
    commands:
      - tapOn: "Today"

- runFlow:
    when:
      visible: "Sign In"
    commands:
      # Switch to sign-up mode
      - tapOn:
          text: ".*Create.*"
      - waitForAnimationToEnd

      # Fill in email (use a fresh address for signup; can match E2E_EMAIL if testing login-only elsewhere)
      - tapOn: "Email"
      - inputText: ${E2E_EMAIL}

      # Fill in password
      - tapOn: "Password"
      - inputText: ${E2E_PASSWORD}

      # Tap Create Account
      - tapOn: "Create Account"
      - waitForAnimationToEnd
      - waitForAnimationToEnd
      - waitForAnimationToEnd
      - waitForAnimationToEnd
      - waitForAnimationToEnd
