# @cases TC-DISCOVER-01
# @screen (tabs)/discover
appId: com.supprclub.supprapp
name: "Discover — search, filters, import CTA, recipe cards"
---
- runFlow: shared/login.yaml

- tapOn: ".*Discover, tab.*"
- waitForAnimationToEnd

# Header (prototype: BROWSE + Discover — no "Recipes that fit your macros" subtitle)
- assertVisible: ".*Browse.*"
- assertVisible: ".*Discover.*"

# Search bar (placeholder updated 2026-04)
- assertVisible: ".*Search 48,000.*"

# Filter pills visible
- assertVisible: ".*For You.*"
- assertVisible: ".*Popular.*"
- assertVisible: ".*Quick.*"
- assertVisible: ".*High Protein.*"
- assertVisible: ".*Low Carb.*"

# Import CTA (ellipsis is three dots in UI)
- assertVisible: ".*Import from TikTok, Instagram.*"

# My Library CTA
- assertVisible: ".*My Library.*"
- assertVisible: ".*Saved and imported recipes.*"

# If recipes are loaded, verify card elements
- runFlow:
    when:
      visible: ".*kcal.*"
    commands:
      - assertVisible: ".*kcal.*"
      - assertVisible: ".*saves.*"

# Tap a filter pill
- tapOn: ".*High Protein.*"
- waitForAnimationToEnd

# Tap back to "For You"
- tapOn: ".*For You.*"
- waitForAnimationToEnd

# Try search (TextInput placeholder may not be tappable; header button focuses the field)
- tapOn: ".*Focus search.*"
- inputText: "chicken"
- waitForAnimationToEnd
- tapOn:
    point: "50%,15%"

# Verify search results or empty state
- runFlow:
    when:
      visible: ".*kcal.*"
    commands:
      - assertVisible: ".*kcal.*"

- runFlow:
    when:
      visible: ".*No recipes found.*"
    commands:
      - assertVisible: ".*No recipes found.*"

# Clear search
- tapOn: ".*Focus search.*"
- eraseText: 7
- tapOn:
    point: "50%,15%"

# Scroll down to verify recipe grid loads more content
- swipe:
    direction: UP
    duration: 400
- waitForAnimationToEnd

# Scroll back up
- swipe:
    direction: DOWN
    duration: 400
- waitForAnimationToEnd

# Verify import button navigates
- tapOn: ".*Import from TikTok.*"
- waitForAnimationToEnd
- assertVisible:
    text: ".*(?:IMPORT|Paste a recipe link|Looking for a link).*"
- tapOn: ".*Back.*"
- waitForAnimationToEnd
