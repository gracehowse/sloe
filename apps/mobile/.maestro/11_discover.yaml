appId: com.supprclub.supprapp
name: "Discover — search, filters, import CTA, recipe cards"
---
- runFlow: shared/login.yaml

- tapOn: ".*Discover.*"
- waitForAnimationToEnd

# Header and subtitle
- assertVisible: ".*Discover.*"
- assertVisible: ".*Recipes that fit your macros.*"

# Search bar
- assertVisible: ".*Search or paste a link....*"

# Filter pills visible
- assertVisible: ".*For You.*"
- assertVisible: ".*Popular.*"
- assertVisible: ".*Quick.*"
- assertVisible: ".*High Protein.*"

# Import CTA
- assertVisible: ".*Import from TikTok, Instagram....*"

# My Library CTA
- assertVisible: ".*My Library.*"
- assertVisible: ".*Saved and imported recipes.*"

# If recipes are loaded, verify card elements
- runFlow:
    when:
      visible: ".*kcal.*"
    commands:
      - assertVisible: ".*kcal.*"
      - assertVisible: ".*saves.*"

# Tap a filter pill
- tapOn: ".*High Protein.*"
- waitForAnimationToEnd

# Tap back to "For You"
- tapOn: ".*For You.*"
- waitForAnimationToEnd

# Try search
- tapOn: ".*Search or paste a link....*"
- inputText: "chicken"
- waitForAnimationToEnd
- tapOn:
    point: "50%,15%"

# Verify search results or empty state
- runFlow:
    when:
      visible: ".*kcal.*"
    commands:
      - assertVisible: ".*kcal.*"

- runFlow:
    when:
      visible: ".*No recipes found.*"
    commands:
      - assertVisible: ".*No recipes found.*"

# Clear search
- tapOn: ".*Search or paste a link....*"
- eraseText: 7
- tapOn:
    point: "50%,15%"

# Scroll down to verify recipe grid loads more content
- swipe:
    direction: UP
    duration: 400
- waitForAnimationToEnd

# Scroll back up
- swipe:
    direction: DOWN
    duration: 400
- waitForAnimationToEnd

# Verify import button navigates
- tapOn: ".*Import from TikTok, Instagram....*"
- waitForAnimationToEnd
- assertVisible:
    text: ".*(?:IMPORT|Paste a recipe link|Looking for a link).*"
- tapOn: ".*Back.*"
- waitForAnimationToEnd
