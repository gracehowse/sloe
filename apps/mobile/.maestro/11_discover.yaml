# @cases TC-DISCOVER-01
# @screen (tabs)/discover
appId: com.supprclub.supprapp
name: "Discover — search, filters, import CTA, recipe cards"
---
- runFlow: shared/login.yaml

# Recipes tab → Discover sub-tab. The legacy "Discover" tab collapsed
# into Recipes/Discover on 2026-04-27 (IA 6→4 tab change). Library is
# the default landing inside Recipes; Discover requires a sub-tab tap.
- tapOn:
    id: "tab-recipes"
- waitForAnimationToEnd
- tapOn:
    id: "subtab-discover"
- waitForAnimationToEnd

# Header — Discover sub-tab loaded.
- assertVisible: ".*Discover.*"

# Search bar — placeholder pivoted from "Search 48,000+ recipes" to
# the more honest "Search recipes" 2026-04 (see (tabs)/discover.tsx:580
# comment: aspirational catalog count was misleading vs real catalog).
- assertVisible: ".*Search recipes.*"

# Filter pills visible (Low Carb scrolls off-screen on smaller viewports).
- assertVisible: ".*For You.*"
- assertVisible: ".*Popular.*"
- assertVisible: ".*Quick.*"

# Import CTA (ellipsis is three dots in UI)
- assertVisible: ".*Import from TikTok, Instagram.*"

# If recipes are loaded, verify card elements (macros visible)
- runFlow:
    when:
      visible: ".*kcal.*"
    commands:
      - assertVisible: ".*kcal.*"

# Tap a filter pill (use a visible one — High Protein may scroll off).
- tapOn: ".*Popular.*"
- waitForAnimationToEnd

# Tap back to "For You"
- tapOn: ".*For You.*"
- waitForAnimationToEnd

# Try search — tap the TextInput by its placeholder.
- tapOn: ".*Search recipes.*"
- inputText: "chicken"
- waitForAnimationToEnd

# Verify search results or empty state
- runFlow:
    when:
      visible: ".*kcal.*"
    commands:
      - assertVisible: ".*kcal.*"

- runFlow:
    when:
      visible: ".*No recipes found.*"
    commands:
      - assertVisible: ".*No recipes found.*"

# Clear search
- tapOn: ".*Search recipes.*"
- eraseText: 7
- waitForAnimationToEnd

# Scroll down to verify recipe grid loads more content
- swipe:
    direction: UP
    duration: 400
- waitForAnimationToEnd

# Scroll back up
- swipe:
    direction: DOWN
    duration: 400
- waitForAnimationToEnd

# Verify import button navigates
- tapOn: ".*Import from TikTok.*"
- waitForAnimationToEnd
- assertVisible:
    text: ".*(?:IMPORT|Paste a recipe link|Looking for a link).*"
- back
- waitForAnimationToEnd
