appId: com.supprclub.supprapp
name: "Progress screen — stats, charts, weight journey, time range"
---
- runFlow: shared/login.yaml

- tapOn:
    id: "tab-you"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: ".*Progress.*"
- extendedWaitUntil:
    visible:
      id: "progress-hydrated"
    timeout: 30000

# Wait for data to fully load (stat tiles or empty state — not just the header).
# 2026-04-20 prototype port: the stable "has data" signal below the
# header is the range-picker overline (e.g. "LAST 30 DAYS"). The
# previous "Weekly report" subtitle was replaced by the overline when
# the prototype's header + range-picker treatment landed.
- extendedWaitUntil:
    visible: ".*(?:LAST 30 DAYS|LAST 7 DAYS|LAST 90 DAYS|ALL TIME|Your progress will appear here|Log meals on the Today tab).*"
    timeout: 30000

# If data exists, verify full stat grid and charts
- runFlow:
    when:
      visible: ".*LAST 30 DAYS.*"
    commands:
      # Range-picker pills live at the top — verify before scrolling.
      - assertVisible: ".*7d.*"
      - assertVisible: ".*30d.*"

      # Daily Calories chart is below the fold — render order is:
      # range overline → stat tiles → Daily Calories chart → Macro
      # Adherence (progress.tsx:1302 + 1406). Scroll to find each.
      - scrollUntilVisible:
          element: ".*Daily Calories.*"
          direction: DOWN
      - assertVisible: ".*Daily Calories.*"
      - scrollUntilVisible:
          element: ".*Macro Adherence.*"
          direction: DOWN
      - assertVisible: ".*Macro Adherence.*"

      # Scroll back to top
      - scrollUntilVisible:
          element: ".*LAST 30 DAYS.*"
          direction: UP

# If empty state, verify guidance text
- runFlow:
    when:
      visible: ".*Your progress will appear here.*"
    commands:
      - assertVisible: ".*Your progress will appear here.*"
      - assertVisible: ".*Log meals on the Today tab.*"
