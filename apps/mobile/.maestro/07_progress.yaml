appId: com.supprclub.supprapp
name: "Progress screen — stats, charts, weight journey, time range"
---
- runFlow: shared/login.yaml

- tapOn: ".*Progress.*"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: ".*Progress.*"

# Wait for data to fully load (stat tiles or empty state — not just the header).
# Uses content from below the header: "Weekly report" subtitle is a plain Text
# node and matches reliably; "AVG CALORIES" gets nested inside icon-card a11y
# wrappers and is intermittently missed by Maestro.
- extendedWaitUntil:
    visible: ".*(?:Weekly report|Your progress will appear here|Log meals on the Today tab).*"
    timeout: 30000

# If data exists, verify full stat grid and charts
- runFlow:
    when:
      visible: ".*Weekly report.*"
    commands:
      - assertVisible: ".*Daily Calories.*"
      - assertVisible: ".*Macro Adherence.*"

      # Scroll to weight section
      - scrollUntilVisible:
          element: ".*Weight.*"
          direction: DOWN
      - assertVisible: ".*Weight.*"

      # Verify time range selector if present
      - runFlow:
          when:
            visible: ".*7D.*"
          commands:
            - assertVisible: ".*7D.*"
            - assertVisible: ".*30D.*"

      # Scroll back to top
      - scrollUntilVisible:
          element: ".*Weekly report.*"
          direction: UP

# If empty state, verify guidance text
- runFlow:
    when:
      visible: ".*Your progress will appear here.*"
    commands:
      - assertVisible: ".*Your progress will appear here.*"
      - assertVisible: ".*Log meals on the Today tab.*"
