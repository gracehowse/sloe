- waitForAnimationToEnd
- waitForAnimationToEnd
- takeScreenshot: screenshots/latest/tour-ext-60-shopping-grouped
- swipe:
    direction: UP
- waitForAnimationToEnd
- takeScreenshot: screenshots/latest/tour-ext-61-shopping-scrolled

# ────────────────────────────────────────────────────────────────────
# G. Onboarding v2 — every step
# ────────────────────────────────────────────────────────────────────
#
# The /onboarding-v2 route renders the MobileFlow component. Without
# resetting onboarding_completed=false on the DB, this route normally
# redirects authed users away. Capture the route as it lands; if the
# user already completed onboarding, the screenshot will show the
# redirect target. To capture every step, sign out + go through the
# flow manually. (Marker — Grace re-runs this section after Erase.)

- openLink: suppr:///onboarding-v2
- waitForAnimationToEnd
- waitForAnimationToEnd
- takeScreenshot: screenshots/latest/tour-ext-70-onboarding-entry

# Tap Continue through each step. Each step's specific captures are
# best taken interactively — defer to Grace's manual run after Erase.

# ────────────────────────────────────────────────────────────────────
# H. Login + auth fallback
# ────────────────────────────────────────────────────────────────────

- openLink: suppr:///login
- waitForAnimationToEnd
- waitForAnimationToEnd
- takeScreenshot: screenshots/latest/tour-ext-80-login

# Return to tab shell so subsequent test runs start clean.
- openLink: suppr:///(tabs)
- waitForAnimationToEnd
