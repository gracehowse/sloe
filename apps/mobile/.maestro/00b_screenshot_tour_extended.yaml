# @cases TC-TOUR-EXTENDED
# @screen multiple
appId: com.supprclub.supprapp
name: "Extended screenshot tour — surfaces not captured by 00_screenshot_tour.yaml"
---
# 2026-04-30 (audit follow-up): the canonical 00_screenshot_tour.yaml
# captures 24 surfaces. Grace's directive ("audit is not complete until
# every single possible user journey is screenshotted") requires
# coverage of every reachable screen. This flow captures the remaining
# surfaces — sub-dialogs, populated states, deep routes that the main
# tour skipped, and the post-fix Reset/Erase modal sheet shape.
#
# Run order:
#   1. apps/mobile/.maestro/00_screenshot_tour.yaml (baseline 24 captures)
#   2. apps/mobile/.maestro/00b_screenshot_tour_extended.yaml (this file, +30 captures)
#
# Coverage scope of this file:
#   - Login + auth fallback states
#   - Sub-views inside main tabs (Library detail, Plan template picker)
#   - Modal sheets (Reset/Erase, Move meal, Log sheet, Voice log)
#   - Deep routes the main tour skips (cook, recipe verify, household)
#   - Populated Today / Plan / Shopping after data is added
#   - Onboarding v2 flow — every step (welcome → recipes terminal)

- runFlow: shared/login.yaml

# ────────────────────────────────────────────────────────────────────
# A. Settings sub-actions — modal sheets after the IA collapse
# ────────────────────────────────────────────────────────────────────

- openLink: suppr:///settings
- waitForAnimationToEnd

# Reset/Erase modal sheet — opens via "Reset or start over" row
# inside the Danger zone section. The sheet itself is the surface
# that audit #16 + #19 + #21 reshaped. Capture the post-fix UI.
# (If the row's id changes, the testID-or-text fallback handles it.)
- runFlow:
    when:
      visible: "Reset or start over"
    commands:
      - tapOn: "Reset or start over"
      - waitForAnimationToEnd
      - takeScreenshot: screenshots/latest/tour-ext-01-reset-modal-mobile
      - tapOn: "Cancel"
      - waitForAnimationToEnd

# Activity level picker — opens from BODY & ACTIVITY → Activity row.
- runFlow:
    when:
      visible: "Activity level"
    commands:
      - tapOn: "Activity level"
      - waitForAnimationToEnd
      - takeScreenshot: screenshots/latest/tour-ext-02-activity-picker
      - tapOn:
          id: "close-activity-picker"
          optional: true
      - back

# ────────────────────────────────────────────────────────────────────
