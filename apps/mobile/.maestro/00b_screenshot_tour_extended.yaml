# ────────────────────────────────────────────────────────────────────
# C. Search modal — opens from Today FAB or Library search icon
# ────────────────────────────────────────────────────────────────────

- openLink: suppr:///(tabs)
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "today-fab"
    commands:
      - tapOn:
          id: "today-fab"
      - waitForAnimationToEnd
      - takeScreenshot: screenshots/latest/tour-ext-30-log-sheet
      # Inside log sheet: voice tab
      - tapOn:
          id: "log-tab-voice"
          optional: true
      - waitForAnimationToEnd
      - takeScreenshot: screenshots/latest/tour-ext-31-log-sheet-voice
      # Inside log sheet: search tab
      - tapOn:
          id: "log-tab-search"
          optional: true
      - waitForAnimationToEnd
      - takeScreenshot: screenshots/latest/tour-ext-32-log-sheet-search
      # Close
      - back

# ────────────────────────────────────────────────────────────────────
# D. Library detail — populated state with a saved recipe
# ────────────────────────────────────────────────────────────────────

- openLink: suppr:///(tabs)/library
- waitForAnimationToEnd
- waitForAnimationToEnd
- takeScreenshot: screenshots/latest/tour-ext-40-library-saved
# Try a recipe card tap (first recipe in the list)
- runFlow:
    when:
      visible:
        id: "recipe-card-0"
    commands:
      - tapOn:
          id: "recipe-card-0"
      - waitForAnimationToEnd
      - waitForAnimationToEnd
      - takeScreenshot: screenshots/latest/tour-ext-41-recipe-detail-saved
      - back

# Discover sub-tab populated
- tapOn:
    id: "subtab-discover"
    optional: true
- waitForAnimationToEnd
- waitForAnimationToEnd
- takeScreenshot: screenshots/latest/tour-ext-42-discover-populated

# ────────────────────────────────────────────────────────────────────
# E. Plan tab — populated week + day detail
# ────────────────────────────────────────────────────────────────────

- openLink: suppr:///(tabs)/planner
- waitForAnimationToEnd
- waitForAnimationToEnd
- takeScreenshot: screenshots/latest/tour-ext-50-plan-this-week
# Tap a meal to open MoveMealSheet
- runFlow:
    when:
      visible: "Lunch"
    commands:
      - longPressOn: "Lunch"
      - waitForAnimationToEnd
      - takeScreenshot: screenshots/latest/tour-ext-51-move-meal-sheet
      - back

# ────────────────────────────────────────────────────────────────────
