# @cases TC-PLAN-01
# @screen (tabs)/planner
appId: com.supprclub.supprapp
name: "Meal plan — generate, view, shopping list"
---
- runFlow: shared/login.yaml

- tapOn:
    id: "tab-plan"
- assertVisible: ".*Meal Plan.*"

# Visual baseline #1 — Plan landing (idle / generated state).
- takeScreenshot: screenshots/latest/plan-01-landing

# Generate button should be visible
- assertVisible:
    text: ".*(?:Generate Plan|Regenerate).*"

# Tap generate
- tapOn:
    text: ".*(?:Generate Plan|Regenerate).*"
- waitForAnimationToEnd

# After generating, should see day cards with macros
- assertVisible:
    text: ".*kcal.*"

# Should see meal slot labels
- assertVisible:
    text: ".*(?:Breakfast|Lunch|Dinner).*"

# Visual baseline #2 — Plan with day cards generated.
- takeScreenshot: screenshots/latest/plan-02-generated

# Shopping list entry (may require scroll on smaller viewports)
- scrollUntilVisible:
    element: ".*Shopping List.*"
    direction: DOWN
- assertVisible: ".*Shopping List.*"

# Visual baseline #3 — Shopping list section in view.
- takeScreenshot: screenshots/latest/plan-03-shopping-section

# Planner supports horizontal day strip — swipe should not crash
- swipe:
    direction: LEFT
    duration: 300
- waitForAnimationToEnd
- swipe:
    direction: RIGHT
    duration: 300
- waitForAnimationToEnd
