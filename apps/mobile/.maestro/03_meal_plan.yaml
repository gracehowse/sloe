# @cases TC-PLAN-01
# @screen (tabs)/planner
appId: com.supprclub.supprapp
name: "Meal plan — generate, view, shopping list"
---
- runFlow: shared/login.yaml

- tapOn:
    id: "tab-plan"
- extendedWaitUntil:
    visible:
      id: "planner-hydrated"
    timeout: 30000
- assertVisible: ".*Meal [Pp]lan.*"

# Visual baseline #1 — Plan landing (idle / generated state).
- takeScreenshot: screenshots/latest/plan-01-landing

# Generate button should be visible
- assertVisible:
    text: ".*(?:Generate Plan|Regenerate).*"

# Tap generate
- tapOn:
    text: ".*(?:Generate Plan|Regenerate).*"
- waitForAnimationToEnd

# Wait for generation to complete — plan summary or day cards.
- extendedWaitUntil:
    visible: ".*(?:kcal|targets|Hits your).*"
    timeout: 15000

# Scroll to day content to verify meal slots loaded.
- scrollUntilVisible:
    element:
      text: ".*(?:Breakfast|Lunch|Dinner|kcal).*"
    direction: DOWN
    timeout: 10000

# Visual baseline #2 — Plan with day cards generated.
- takeScreenshot: screenshots/latest/plan-02-generated

# Shopping sub-tab verifies list content.
- tapOn: ".*Shopping.*"
- waitForAnimationToEnd
- takeScreenshot: screenshots/latest/plan-03-shopping

# Return to This week
- tapOn: ".*This week.*"
- waitForAnimationToEnd
