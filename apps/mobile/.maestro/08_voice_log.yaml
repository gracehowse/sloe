appId: com.supprclub.supprapp
name: "Voice log — Pro sheet + free-tier paywall sheet (M2 2026-04-18)"
---
- runFlow: shared/login.yaml

- tapOn: ".*Today, tab.*"
- waitForAnimationToEnd

# Tap Voice quick-log button
- tapOn: ".*Voice.*"
- waitForAnimationToEnd

# M2 (2026-04-18) — free-tier / Base users now see the in-flow
# `AiPaywallSheet` (NOT a navigation to the `/paywall` full-route
# surface). When the test account is free / Base, the sheet's title
# and "See Pro plans" CTA are present; tap "Not now" to dismiss and
# end the flow here — the voice sheet never opens for free users.
- runFlow:
    when:
      visible: ".*Voice logging is a Pro feature.*"
    commands:
      - assertVisible:
          text: ".*See Pro plans.*"
      - assertVisible:
          text: ".*Not now.*"
      - tapOn: ".*Not now.*"
      - waitForAnimationToEnd
      - assertVisible:
          text: ".*(?:LOGGED|kcal).*"
      - stopApp

# Pro branch — the real voice-log sheet opened.
# Verify the voice log modal opened (Voice Log header + intro text)
- assertVisible:
    text: ".*Voice Log.*"
- assertVisible:
    text: ".*Describe what you ate.*"
- assertVisible:
    text: ".*Type what you ate.*"

# Verify the submit button (the modal uses "Log Food", not Cancel/Submit)
- assertVisible: ".*Log Food.*"

# Type a food description into the input
- tapOn:
    text: ".*Type what you ate.*"
- inputText: "2 scrambled eggs and toast with butter"
- waitForAnimationToEnd

# Submit button still visible
- assertVisible: ".*Log Food.*"

# Dismiss the bottom sheet by tapping the backdrop (top of screen, above the sheet)
- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd

# Verify we're back on Today screen
- assertVisible:
    text: ".*(?:LOGGED|kcal).*"

# Re-open and dismiss via backdrop again
- tapOn: ".*Voice.*"
- waitForAnimationToEnd
- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd
