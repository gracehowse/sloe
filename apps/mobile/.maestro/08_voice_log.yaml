appId: com.supprclub.supprapp
name: "Voice log — text input fallback, submit, cancel"
---
- runFlow: shared/login.yaml

- tapOn: ".*Today, tab.*"
- waitForAnimationToEnd

# Tap Voice quick-log button
- tapOn: ".*Voice.*"
- waitForAnimationToEnd

# Verify the voice log modal opened (Voice Log header + intro text)
- assertVisible:
    text: ".*Voice Log.*"
- assertVisible:
    text: ".*Describe what you ate.*"
- assertVisible:
    text: ".*Type what you ate.*"

# Verify the submit button (the modal uses "Log Food", not Cancel/Submit)
- assertVisible: ".*Log Food.*"

# Type a food description into the input
- tapOn:
    text: ".*Type what you ate.*"
- inputText: "2 scrambled eggs and toast with butter"
- waitForAnimationToEnd

# Submit button still visible
- assertVisible: ".*Log Food.*"

# Dismiss the bottom sheet by tapping the backdrop (top of screen, above the sheet)
- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd

# Verify we're back on Today screen
- assertVisible:
    text: ".*(?:LOGGED|kcal).*"

# Re-open and dismiss via backdrop again
- tapOn: ".*Voice.*"
- waitForAnimationToEnd
- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd
