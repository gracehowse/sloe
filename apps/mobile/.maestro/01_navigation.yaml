# @cases TC-NAV-01
# @screen (tabs)
appId: com.supprclub.supprapp
name: "Tab navigation — all 4 tabs load and respond"
---
- runFlow: shared/login.yaml

# Verify Today screen loaded with key content
- assertVisible:
    id: "tab-today"
- assertVisible:
    text: ".*(?:LOGGED|kcal).*"

# Recipes tab — Library is the default sub-tab (per (tabs)/_layout.tsx).
# Discover lives behind a sub-tab pill inside Recipes (RecipesSubTabHeader).
- tapOn:
    id: "tab-recipes"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- tapOn:
    id: "subtab-discover"
- waitForAnimationToEnd
# Discover prototype header (Browse + Discover); not the old macro subtitle.
- assertVisible: ".*Browse.*"
- assertVisible: ".*Discover.*"

# Plan tab — verify content loads
- tapOn:
    id: "tab-plan"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: ".*Meal Plan.*"

# You tab — Progress is the default sub-tab (per (tabs)/_layout.tsx).
- tapOn:
    id: "tab-you"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: ".*(?:LAST 30 DAYS|LAST 7 DAYS|LAST 90 DAYS|ALL TIME|progress will appear).*"

# Settings sub-tab inside You — Group G IA (2026-04-28) collapsed to
# Progress + Settings only. Settings page anchors verified here:
# "Your plan" header, "Appearance", "Account" — all live on /settings
# (not on /more). Goals & Targets is currently orphaned on /more
# pending Group G batches B-E migration.
- tapOn:
    id: "subtab-settings"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: ".*(?:Your plan|Appearance|Account).*"

# Return to Today — round-trip complete
- tapOn:
    id: "tab-today"
- waitForAnimationToEnd
- assertVisible:
    id: "tab-today"

# Rapid tab switching — regression test for crash/flicker
- tapOn:
    id: "tab-recipes"
- tapOn:
    id: "tab-plan"
- tapOn:
    id: "tab-you"
- tapOn:
    id: "tab-today"
- waitForAnimationToEnd
- assertVisible:
    id: "tab-today"
