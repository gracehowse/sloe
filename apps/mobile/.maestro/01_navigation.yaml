# @cases TC-NAV-01
# @screen (tabs)
appId: com.supprclub.supprapp
name: "Tab navigation — all 4 tabs load and respond"
---
- runFlow: shared/login.yaml

# Verify Today screen loaded with key content
- assertVisible:
    text: ".*Today, tab.*"
- assertVisible:
    text: ".*(?:LOGGED|kcal).*"

# Recipes tab — Library is the default sub-tab (per (tabs)/_layout.tsx).
# Discover lives behind a sub-tab pill inside Recipes (RecipesSubTabHeader).
- tapOn: ".*Recipes, tab.*"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- tapOn:
    text: "Discover"
    accessibilityRole: "tab"
- waitForAnimationToEnd
# Discover prototype header (Browse + Discover); not the old macro subtitle.
- assertVisible: ".*Browse.*"
- assertVisible: ".*Discover.*"

# Plan tab — verify content loads
- tapOn: ".*Plan, tab.*"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: ".*Meal Plan.*"

# You tab — Progress is the default sub-tab (per (tabs)/_layout.tsx).
- tapOn: ".*You, tab.*"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: ".*(?:LAST 30 DAYS|LAST 7 DAYS|LAST 90 DAYS|ALL TIME|progress will appear).*"

# Settings sub-tab inside You — replaces the legacy "More" tab.
- tapOn:
    text: "Settings"
    accessibilityRole: "tab"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: ".*Goals & Targets.*"

# Return to Today — round-trip complete
- tapOn: ".*Today, tab.*"
- waitForAnimationToEnd
- assertVisible: ".*Today, tab.*"

# Rapid tab switching — regression test for crash/flicker
- tapOn: ".*Recipes, tab.*"
- tapOn: ".*Plan, tab.*"
- tapOn: ".*You, tab.*"
- tapOn: ".*Today, tab.*"
- waitForAnimationToEnd
- assertVisible: ".*Today, tab.*"
