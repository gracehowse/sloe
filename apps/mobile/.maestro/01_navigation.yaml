# @cases TC-NAV-01
# @screen (tabs)
appId: com.supprclub.supprapp
name: "Tab navigation — all 4 tabs load and respond"
---
- runFlow: shared/login.yaml

# Verify Today screen loaded with key content
- assertVisible:
    id: "tab-today"
- assertVisible:
    text: ".*(?:LOGGED|kcal).*"

# Recipes tab — Library is the default sub-tab (per (tabs)/_layout.tsx).
# Discover lives behind a sub-tab pill inside Recipes (RecipesSubTabHeader).
- tapOn:
    id: "tab-recipes"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- tapOn:
    id: "subtab-discover"
- waitForAnimationToEnd
# Discover sub-tab loaded — verify search bar and filter pills.
- assertVisible: ".*Discover.*"
- assertVisible: ".*(?:Search recipes|For You|Popular).*"

# Plan tab — verify content loads
- tapOn:
    id: "tab-plan"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: ".*Meal Plan.*"

# Progress tab (testID tab-you for Maestro stability).
- tapOn:
    id: "tab-you"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: ".*(?:LAST 30 DAYS|LAST 7 DAYS|LAST 90 DAYS|ALL TIME|progress will appear).*"

# Settings — opened from Today header avatar (not a tab-bar sub-tab).
- tapOn:
    id: "tab-today"
- waitForAnimationToEnd
- tapOn:
    text: "Open settings"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: ".*(?:Settings|Membership|People|Manage subscription).*"
- tapOn:
    text: "Go back"
- waitForAnimationToEnd

# Return to Today — round-trip complete
- tapOn:
    id: "tab-today"
- waitForAnimationToEnd
- assertVisible:
    id: "tab-today"

# Rapid tab switching — regression test for crash/flicker
- tapOn:
    id: "tab-recipes"
- tapOn:
    id: "tab-plan"
- tapOn:
    id: "tab-you"
- tapOn:
    id: "tab-today"
- waitForAnimationToEnd
- assertVisible:
    id: "tab-today"
