# @cases TC-NAV-01
# @screen (tabs)
appId: com.supprclub.supprapp
name: "Tab navigation — all 5 tabs load and respond"
---
- runFlow: shared/login.yaml

# Verify Today screen loaded with key content
- assertVisible:
    text: ".*Today, tab.*"
- assertVisible:
    text: ".*(?:LOGGED|kcal).*"

# Discover tab — verify content loads
- tapOn: ".*Discover, tab.*"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
# Discover prototype header (Browse + Discover); not the old macro subtitle.
- assertVisible: ".*Browse.*"
- assertVisible: ".*Discover.*"

# Plan tab — verify content loads
- tapOn: ".*Plan, tab.*"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: ".*Meal Plan.*"

# Progress tab — verify content loads
- tapOn: ".*Progress, tab.*"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: ".*(?:LAST 30 DAYS|LAST 7 DAYS|LAST 90 DAYS|ALL TIME|progress will appear).*"

# More tab (tab title is "More", not "Profile")
- tapOn: ".*More, tab.*"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: ".*Goals & Targets.*"

# Return to Today — round-trip complete
- tapOn: ".*Today, tab.*"
- waitForAnimationToEnd
- assertVisible: ".*Today, tab.*"

# Rapid tab switching — regression test for crash/flicker
- tapOn: ".*Discover, tab.*"
- tapOn: ".*Plan, tab.*"
- tapOn: ".*Progress, tab.*"
- tapOn: ".*More, tab.*"
- tapOn: ".*Today, tab.*"
- waitForAnimationToEnd
- assertVisible: ".*Today, tab.*"
