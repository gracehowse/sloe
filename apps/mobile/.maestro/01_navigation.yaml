appId: host.exp.Exponent
name: "Tab navigation — all 5 tabs load"
---
- runFlow: shared/login.yaml

# Verify all tabs
- assertVisible: "kcal"

- tapOn: "Discover"
- waitForAnimationToEnd

- tapOn: "Plan"
- assertVisible: "Meal Plan"

- tapOn: "Progress"
- assertVisible: "Progress"

- tapOn: "Profile"
- waitForAnimationToEnd

- tapOn: "Today"
- assertVisible: "kcal"
