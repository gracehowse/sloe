# @cases TC-NOTIF-01
# @screen (tabs)/notifications
appId: com.supprclub.supprapp
name: "Notifications — inbox, mark read, empty state"
---
- runFlow: shared/login.yaml

# You tab → Settings sub-tab. Notifications section + "Open notifications"
# row both live on /settings (post Group G IA collapse).
- tapOn:
    id: "tab-you"
- waitForAnimationToEnd
- tapOn:
    id: "subtab-settings"
- waitForAnimationToEnd

- scrollUntilVisible:
    element: ".*Notifications.*"
    direction: DOWN
- tapOn: ".*Notifications.*"
- waitForAnimationToEnd

- assertVisible: ".*Notifications.*"

# Empty inbox
- runFlow:
    when:
      visible: ".*No unread notifications.*"
    commands:
      - assertVisible: ".*No unread notifications.*"

# Inbox actions when messages exist
- runFlow:
    when:
      visible: ".*Mark all read.*"
    commands:
      - assertVisible: ".*Mark all read.*"

- runFlow:
    when:
      visible: ".*unread.*"
    commands:
      - assertVisible: ".*unread.*"

- tapOn:
    point: "5%,8%"
- waitForAnimationToEnd
