# @cases TC-IMPORT-01
# @screen import-shared
appId: com.supprclub.supprapp
name: "Import Shared Recipe — idle state, URL input, source grid"
---
- runFlow: shared/login.yaml

# Recipes tab → Discover sub-tab. The legacy "Discover" tab collapsed
# into Recipes/Discover on 2026-04-27 (IA 6→4 tab change). Library is
# the default landing inside Recipes; Discover requires a sub-tab tap.
# Use testID-based selectors (subtab-discover from SubTabPill primitive,
# discover-import-cta on the Import row) — text-based matching was
# ambiguous and timing-sensitive.
- tapOn:
    id: "tab-recipes"
- waitForAnimationToEnd
- tapOn:
    id: "subtab-discover"
- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: "discover-import-cta"
    direction: DOWN

# Visual baseline #1 — Discover with import row in view.
- takeScreenshot: screenshots/latest/import-01-discover

# Tap the Discover import row
- tapOn:
    id: "discover-import-cta"
- waitForAnimationToEnd

# Verify import screen loaded
- runFlow:
    when:
      visible: ".*IMPORT.*"
    commands:
      # Verify the screen header
      - assertVisible: ".*IMPORT.*"

      # Verify idle state UI — the import header.
      # recipe-import-redesign (ENG-997): the redesigned idle leads with
      # the serif "Import a recipe" H1; the legacy flag-OFF idle still
      # shows "Paste a recipe link". Either is acceptable.
      - assertVisible:
          text: ".*(?:Import a recipe|Paste a recipe link|Looking for a link).*"

      # Visual baseline #2 — Import idle state.
      # Catches paste-field padding, trust-chip row alignment, button stacking.
      - takeScreenshot: screenshots/latest/import-02-idle

      # Verify the "WORKS WITH" trust-chip row. The old "IMPORT FROM" tinted
      # icon-box grid (a fake four-way router) was demoted to a non-tappable
      # trust row of platform monograms (TT/IG/YT/W) — gap #2/#6/ENG-997.
      - runFlow:
          when:
            visible: ".*WORKS WITH.*"
          commands:
            - assertVisible: ".*WORKS WITH.*"

      # Verify clipboard button
      - runFlow:
          when:
            visible: ".*Use clipboard.*"
          commands:
            - assertVisible: ".*Use clipboard.*"

      # Verify Import button
      - runFlow:
          when:
            visible:
              text: "Import"
              index: 1
          commands:
            - assertVisible: ".*Import.*"

      # Go back
      - tapOn: ".*Back.*"
      - waitForAnimationToEnd
