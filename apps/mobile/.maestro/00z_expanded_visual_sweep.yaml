appId: com.supprclub.supprapp
name: "Expanded visual sweep — every tab, sub-screen, primary action, modal state"
---
# Expanded visual sweep flow. Replaces the narrow `00_quick_sim_tour`
# captured in the 2026-05-11 visual sweep (which only hit 12 screens
# + missed dozens of real bugs).
#
# v2 (2026-05-11 evening): swap regex `extendedWaitUntil` for screen-
# specific testID anchors (`screen-<name>`) so the screenshot fires
# AFTER the actual screen content mounts, not when the tab label
# happens to be visible. The original sweep's `.*Today.*` matched
# the bottom-tab-bar "Today" label and fired before Today's content
# loaded — producing splash-only captures. With testID anchors the
# capture races the mount of THAT screen's root container.
#
# Run with:
#   maestro test apps/mobile/.maestro/00z_expanded_visual_sweep.yaml
#
# Output: docs/audits/visual-sweep-expanded/<NN>-<name>.png

- launchApp:
    appId: com.supprclub.supprapp

# ──────────────────────────────────────────────────────────────────────
# SECTION 1 — Tab landings + scrolled state
# ──────────────────────────────────────────────────────────────────────

# Today
- openLink: suppr:///
- extendedWaitUntil:
    visible:
      id: "today-hydrated"
    timeout: 30000
- waitForAnimationToEnd
- takeScreenshot: ../../docs/audits/visual-sweep-expanded/01-today-default
- swipe:
    direction: UP
- waitForAnimationToEnd
- takeScreenshot: ../../docs/audits/visual-sweep-expanded/02-today-scrolled-mid
- swipe:
    direction: UP
- waitForAnimationToEnd
- takeScreenshot: ../../docs/audits/visual-sweep-expanded/03-today-scrolled-bottom

