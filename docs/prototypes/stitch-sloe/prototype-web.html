<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Sloe · Web prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:#E8E2EC;font-family:Inter,system-ui,sans-serif;color:#221B26}
  .top{display:flex;align-items:center;gap:10px;padding:14px 20px;flex-wrap:wrap;border-bottom:1px solid #d8d2dd;background:#fff;position:sticky;top:0;z-index:10}
  .brand{font-family:Newsreader,serif;font-size:20px;font-weight:600;color:#3B2A4D;margin-right:8px}
  .grp{display:flex;gap:6px;align-items:center}
  .sep{width:1px;height:22px;background:#e0dae6;margin:0 6px}
  .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#9B93A3;margin-right:2px}
  .btn{font-size:13px;font-weight:600;border:1px solid #E8E2EC;background:#fff;color:#221B26;border-radius:999px;padding:7px 13px;cursor:pointer}
  .btn.on{background:#C8794E;color:#fff;border-color:#C8794E}
  .stage{padding:28px;display:flex;justify-content:center;overflow-x:auto}
  .browser{background:#fff;border-radius:14px;box-shadow:0 30px 70px -25px rgba(34,27,38,.4);overflow:hidden;transition:width .25s ease;width:1280px}
  .chrome{height:44px;background:#f3f1ee;border-bottom:1px solid #e8e2ec;display:flex;align-items:center;gap:8px;padding:0 14px}
  .dot{width:11px;height:11px;border-radius:50%}
  .url{flex:1;margin-left:8px;height:24px;background:#fff;border:1px solid #e8e2ec;border-radius:7px;font-size:12px;color:#9B93A3;display:flex;align-items:center;padding:0 12px}
  iframe{width:100%;height:760px;border:0;display:block;background:#fff}
</style></head>
<body>
  <div class="top">
    <span class="brand">Sloe</span>
    <div class="grp">
      <button class="btn" onclick="go('landing.html')">Landing</button>
      <button class="btn" onclick="go('onboarding-welcome-web.html')">Onboarding</button>
      <button class="btn" onclick="go('today-web.html')">App · Today</button>
    </div>
    <div class="sep"></div>
    <div class="grp"><span class="lbl">Width</span>
      <button class="btn on" data-w="1280" onclick="setW(this,1280)">Desktop</button>
      <button class="btn" data-w="834" onclick="setW(this,834)">Tablet</button>
      <button class="btn" data-w="412" onclick="setW(this,412)">Mobile</button>
    </div>
  </div>
  <div class="stage">
    <div class="browser" id="b">
      <div class="chrome"><span class="dot" style="background:#ff5f57"></span><span class="dot" style="background:#febc2e"></span><span class="dot" style="background:#28c840"></span><span class="url" id="url">sloe.app</span></div>
      <iframe id="f" name="webscreen" src="landing.html"></iframe>
    </div>
  </div>
  <script>
    var f=document.getElementById('f'), b=document.getElementById('b'), url=document.getElementById('url');
    function go(u){f.src=u; url.textContent='sloe.app/'+u.replace('.html','').replace('-web','');}
    function setW(el,w){b.style.width=w+'px'; document.querySelectorAll('[data-w]').forEach(function(x){x.classList.toggle('on',x===el)});}
  </script>
</body></html>
