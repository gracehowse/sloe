<!DOCTYPE html>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>tailwind.config={theme:{extend:{colors:{plum:'#3B2A4D','plum-deep':'#241733',damson:'#6A4B7A',frost:'#C9C2D6','frost-mist':'#EDEAF1',clay:'#C8794E','clay-soft':'#F4E2D2',honey:'#D6A24A',sage:'#5E7C5A',amber:'#C9892C',destructive:'#C0533F',ink:{DEFAULT:'#221B26',soft:'#6A6072',faint:'#9B93A3'},line:'#E8E2EC',surface:{DEFAULT:'#FFFFFF',card:'#F6F5F2'},oat:'#FBF8F3',macro:{protein:'#7C8466',carbs:'#C8794E',fat:'#C9892C',fiber:'#4A7878'}},borderRadius:{DEFAULT:'0.5rem',lg:'1rem',xl:'1.5rem','2xl':'1.25rem',full:'9999px'},fontFamily:{headline:['Newsreader','serif'],display:['Newsreader','serif'],body:['Inter','sans-serif'],label:['Inter','sans-serif']}}}}</script>
<style>

body{position:relative;padding-bottom:0}
[class~="fixed"][class*="bottom-"],[class~="sticky"][class*="bottom-"]{position:static !important;width:100% !important}
</style></head>
<body class="bg-surface text-ink font-body antialiased">

<header class="w-full bg-surface border-b border-line flex items-center justify-between px-4 h-16">
<button onclick="history.back()" class="p-1 -ml-1 text-plum"><svg class="sloe-ico text-2xl" viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg></button>
<h1 class="font-headline text-xl text-plum">Account</h1>
<div class="w-8 flex items-center justify-end text-ink-soft"></div>
</header>
<main class="px-5 pt-5 pb-10 max-w-2xl mx-auto space-y-7">
  <div class="flex items-center gap-4">
    <span class="w-16 h-16 rounded-full bg-damson flex items-center justify-center text-white font-headline text-2xl flex-none">G</span>
    <div class="flex-1"><p class="font-headline text-xl text-ink leading-tight">Grace Turner</p><p class="font-body text-[13px] text-ink-faint">grace@sloe.app</p></div>
    <button class="font-body text-sm font-semibold text-clay border border-line rounded-full px-4 py-2">Edit</button>
  </div>
  <section class="bg-frost-mist/50 rounded-2xl p-5">
    <div class="flex items-center justify-between">
      <div><p class="font-label text-[11px] uppercase tracking-[0.08em] text-clay font-semibold">Sloe Pro</p><p class="font-body text-[13px] text-ink-soft mt-0.5">£7.99 / month · renews 5 Jan</p></div>
      <span class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-clay"><svg class="sloe-ico text-[18px]" viewBox="0 0 24 24" aria-hidden="true"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/></svg></span>
    </div>
    <button class="w-full mt-4 bg-white border border-line text-ink font-body font-semibold text-sm rounded-full py-2.5">Manage plan</button>
  </section>
  <section><h2 class="font-label text-[11px] uppercase tracking-[0.08em] text-ink-faint mb-2 px-1">Billing</h2><div class="bg-surface-card border border-line rounded-2xl px-4"><div class="flex items-center justify-between py-3.5 border-b border-line last:border-0"><span class="font-body text-[15px] text-ink">Payment method</span><span class="font-body text-sm text-ink-faint inline-flex items-center gap-1.5">App Store <svg class="sloe-ico text-[16px]" viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg></span></div><div class="flex items-center justify-between py-3.5 border-b border-line last:border-0"><span class="font-body text-[15px] text-ink">Billing history</span><span class="font-body text-sm text-ink-faint inline-flex items-center gap-1.5"> <svg class="sloe-ico text-[16px]" viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg></span></div><div class="flex items-center justify-between py-3.5 border-b border-line last:border-0"><span class="font-body text-[15px] text-ink">Restore purchases</span><span class="font-body text-sm text-ink-faint inline-flex items-center gap-1.5"> <svg class="sloe-ico text-[16px]" viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg></span></div></div></section>
  <section><h2 class="font-label text-[11px] uppercase tracking-[0.08em] text-ink-faint mb-2 px-1">Preferences</h2><div class="bg-surface-card border border-line rounded-2xl px-4"><div class="flex items-center justify-between py-3.5 border-b border-line last:border-0"><span class="font-body text-[15px] text-ink">Units</span><span class="font-body text-sm text-ink-faint inline-flex items-center gap-1.5">Metric <svg class="sloe-ico text-[16px]" viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg></span></div><div class="flex items-center justify-between py-3.5 border-b border-line last:border-0"><span class="font-body text-[15px] text-ink">Connected apps</span><span class="font-body text-sm text-ink-faint inline-flex items-center gap-1.5">Apple Health <svg class="sloe-ico text-[16px]" viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg></span></div><div class="flex items-center justify-between py-3.5 border-b border-line last:border-0"><span class="font-body text-[15px] text-ink">Region</span><span class="font-body text-sm text-ink-faint inline-flex items-center gap-1.5">United Kingdom <svg class="sloe-ico text-[16px]" viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg></span></div></div></section>
  <section><div class="bg-surface-card border border-line rounded-2xl px-4"><div class="flex items-center justify-between py-3.5 border-b border-line last:border-0"><span class="font-body text-[15px] text-ink">Log out</span><span class="font-body text-sm text-ink-faint inline-flex items-center gap-1.5"> <svg class="sloe-ico text-[16px]" viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg></span></div><div class="flex items-center justify-between py-3.5 border-b border-line last:border-0"><span class="font-body text-[15px] text-destructive">Delete account & data</span><span class="font-body text-sm text-ink-faint inline-flex items-center gap-1.5"> <svg class="sloe-ico text-[16px]" viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg></span></div></div></section>
</main>
<script>document.addEventListener('click',function(e){
 var n=e.target.closest('[data-nav]'); if(n){e.preventDefault();location.href=n.getAttribute('data-nav');return;}
 var el=e.target.closest('a,button,[role=button],label'); if(!el) return;
 var t=(el.textContent||'').trim().toLowerCase().replace(/\s+/g,' ');
 var nx=document.body.getAttribute('data-next');
 var map={'get started':'onboarding.html','i already have an account':'auth.html','continue with apple':'onboarding.html','continue with google':'onboarding.html','continue with email':'onboarding.html','continue':nx,'next step':nx,'no allergies':'onboarding-plan.html','start using sloe':'today.html','start cooking':'cook.html','cook':'cook.html','import recipe':'recipe-verify.html','add custom item':null,'log a meal':'logmeal.html'};
 if(t in map && map[t]){e.preventDefault();location.href=map[t];return;}
 var card=e.target.closest('[data-recipe],.recipe-card'); if(card){e.preventDefault();location.href='recipe.html';}
},true);</script>
