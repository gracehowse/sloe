<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta name="viewport" content="width=500, initial-scale=1, viewport-fit=cover"/>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<meta charset="utf-8"/>
<title>Sloe · Add a recipe</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>tailwind.config={theme:{extend:{colors:{plum:'#3B2A4D','plum-deep':'#241733',damson:'#6A4B7A',frost:'#C9C2D6','frost-mist':'#EDEAF1',clay:'#C8794E','clay-soft':'#F4E2D2',honey:'#D6A24A',sage:'#5E7C5A',amber:'#C9892C',destructive:'#C0533F',ink:{DEFAULT:'#221B26',soft:'#6A6072',faint:'#9B93A3'},line:'#E8E2EC',surface:{DEFAULT:'#FFFFFF',card:'#F6F5F2'},oat:'#FBF8F3',macro:{protein:'#7C8466',carbs:'#C8794E',fat:'#C9892C',fiber:'#4A7878'}},borderRadius:{DEFAULT:'0.5rem',lg:'1rem',xl:'1.5rem','2xl':'1.25rem',full:'9999px'},fontFamily:{headline:['Newsreader','serif'],display:['Newsreader','serif'],body:['Inter','sans-serif'],label:['Inter','sans-serif']}}}}</script>
<style>
svg.sloe-ico{width:1em;height:1em;font-size:24px;display:inline-block;vertical-align:-0.15em;flex:none;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
body{position:relative;padding-bottom:0}
[class~="fixed"][class*="bottom-"],[class~="sticky"][class*="bottom-"]{position:static !important;width:100% !important}
</style></head>
<body class="bg-surface text-ink font-body antialiased">

<header class="w-full bg-surface border-b border-line flex items-center justify-between px-4 h-16">
<button onclick="history.back()" class="p-1 -ml-1 text-plum"><svg class="sloe-ico text-2xl" viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg></button>
<h1 class="font-headline text-xl text-plum">Add a recipe</h1>
<div class="w-8 flex items-center justify-end text-ink-soft"></div>
</header>
<main class="px-5 pt-6 pb-10 max-w-2xl mx-auto space-y-7">
  <div>
    <h1 class="font-headline text-2xl text-ink mb-1">Import from anywhere</h1>
    <p class="font-body text-sm text-ink-soft">Paste a link from Instagram, TikTok or any recipe site — we'll pull the ingredients and work out the nutrition.</p>
  </div>
  <div class="flex items-center gap-2.5 bg-surface-card border border-line rounded-full px-4 py-3.5"><svg class="sloe-ico text-[18px] text-ink-faint" viewBox="0 0 24 24" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg><span class="font-body text-sm text-ink-faint flex-1">Paste a link, Reel or TikTok</span></div>
  <button class="w-full bg-clay text-white font-body font-semibold text-base rounded-full py-4 flex items-center justify-center gap-2"><svg class="sloe-ico text-[18px]" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg> Import recipe</button>
  <div class="flex items-center gap-3"><div class="flex-1 h-px bg-line"></div><span class="font-label text-[11px] uppercase tracking-wide text-ink-faint">or</span><div class="flex-1 h-px bg-line"></div></div>
  <div class="flex gap-3">
    <button class="flex-1 bg-surface-card border border-line rounded-2xl p-4 flex flex-col items-center gap-2 text-center">
    <span class="w-11 h-11 rounded-full bg-white border border-line flex items-center justify-center text-clay"><svg class="sloe-ico text-[20px]" viewBox="0 0 24 24" aria-hidden="true"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg></span>
    <span class="font-headline text-[15px] text-ink leading-tight">Photo</span><span class="font-body text-[11px] text-ink-faint">Snap a recipe</span></button>
    <button class="flex-1 bg-surface-card border border-line rounded-2xl p-4 flex flex-col items-center gap-2 text-center">
    <span class="w-11 h-11 rounded-full bg-white border border-line flex items-center justify-center text-clay"><svg class="sloe-ico text-[20px]" viewBox="0 0 24 24" aria-hidden="true"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg></span>
    <span class="font-headline text-[15px] text-ink leading-tight">Paste text</span><span class="font-body text-[11px] text-ink-faint">From notes</span></button>
    <button class="flex-1 bg-surface-card border border-line rounded-2xl p-4 flex flex-col items-center gap-2 text-center">
    <span class="w-11 h-11 rounded-full bg-white border border-line flex items-center justify-center text-clay"><svg class="sloe-ico text-[20px]" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M8 7v10"/><path d="M12 7v10"/><path d="M17 7v10"/></svg></span>
    <span class="font-headline text-[15px] text-ink leading-tight">Scan</span><span class="font-body text-[11px] text-ink-faint">Barcode</span></button>
  </div>
  <section class="bg-frost-mist/60 rounded-2xl p-5 flex items-center gap-4">
    <span class="w-11 h-11 rounded-full bg-white flex items-center justify-center text-plum flex-none"><svg class="sloe-ico text-[18px]" viewBox="0 0 24 24" aria-hidden="true"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/></svg></span>
    <p class="font-body text-[13px] text-ink-soft leading-relaxed">Imported recipes are macro-checked automatically, then you confirm anything vague.</p>
  </section>
</main>
<script>document.addEventListener('click',function(e){
 var n=e.target.closest('[data-nav]'); if(n){e.preventDefault();location.href=n.getAttribute('data-nav');return;}
 var el=e.target.closest('a,button,[role=button],label'); if(!el) return;
 var t=(el.textContent||'').trim().toLowerCase().replace(/\s+/g,' ');
 var nx=document.body.getAttribute('data-next');
 var map={'get started':'onboarding.html','i already have an account':'auth.html','continue with apple':'onboarding.html','continue with google':'onboarding.html','continue with email':'onboarding.html','continue':nx,'next step':nx,'no allergies':'onboarding-plan.html','start using sloe':'today.html','start cooking':'cook.html','cook':'cook.html','import recipe':'recipe-verify.html','add custom item':null,'log a meal':'logmeal.html'};
 if(t in map && map[t]){e.preventDefault();location.href=map[t];return;}
 var card=e.target.closest('[data-recipe],.recipe-card'); if(card){e.preventDefault();location.href='recipe.html';}
},true);</script>
</body></html>
