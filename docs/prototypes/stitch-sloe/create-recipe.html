<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta name="viewport" content="width=500, initial-scale=1, viewport-fit=cover"/>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<meta charset="utf-8"/>
<title>Sloe · New recipe</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>tailwind.config={theme:{extend:{colors:{plum:'#3B2A4D','plum-deep':'#241733',damson:'#6A4B7A',frost:'#C9C2D6','frost-mist':'#EDEAF1',clay:'#C8794E','clay-soft':'#F4E2D2',honey:'#D6A24A',sage:'#5E7C5A',amber:'#C9892C',destructive:'#C0533F',ink:{DEFAULT:'#221B26',soft:'#6A6072',faint:'#9B93A3'},line:'#E8E2EC',surface:{DEFAULT:'#FFFFFF',card:'#F6F5F2'},oat:'#FBF8F3',macro:{protein:'#7C8466',carbs:'#C8794E',fat:'#C9892C',fiber:'#4A7878'}},borderRadius:{DEFAULT:'0.5rem',lg:'1rem',xl:'1.5rem','2xl':'1.25rem',full:'9999px'},fontFamily:{headline:['Newsreader','serif'],display:['Newsreader','serif'],body:['Inter','sans-serif'],label:['Inter','sans-serif']}}}}</script>
<style>
svg.sloe-ico{width:1em;height:1em;font-size:24px;display:inline-block;vertical-align:-0.15em;flex:none;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
body{position:relative;padding-bottom:0}
[class~="fixed"][class*="bottom-"],[class~="sticky"][class*="bottom-"]{position:static !important;width:100% !important}
</style></head>
<body class="bg-surface text-ink font-body antialiased">

<header class="w-full bg-surface border-b border-line flex items-center justify-between px-4 h-16">
<button onclick="history.back()" class="p-1 -ml-1 text-plum"><svg class="sloe-ico text-2xl" viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg></button>
<h1 class="font-headline text-xl text-plum">New recipe</h1>
<div class="w-8 flex items-center justify-end text-ink-soft"><span class="font-body text-sm font-semibold text-clay">Save</span></div>
</header>
<main class="px-5 pt-5 pb-10 max-w-2xl mx-auto space-y-6">
  <div class="w-full aspect-[16/9] rounded-2xl border-2 border-dashed border-line bg-surface-card flex flex-col items-center justify-center text-ink-faint gap-2">
    <svg class="sloe-ico text-3xl text-ink-faint" viewBox="0 0 24 24" aria-hidden="true"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg><span class="font-body text-sm">Add a photo of your dish</span>
  </div>
  <div>
    <label class="font-label text-[11px] uppercase tracking-[0.06em] text-ink-faint">Title</label>
    <input class="w-full mt-1 bg-transparent border-b border-line py-2 font-headline text-2xl text-ink placeholder:text-ink-faint focus:outline-none" placeholder="Name your recipe" value="Warm Tahini Grain Bowl"/>
  </div>
  <div class="flex items-center justify-between border-b border-line pb-3">
    <span class="font-body text-[15px] text-ink">Servings</span>
    <div class="flex items-center gap-4">
      <button class="w-8 h-8 rounded-full bg-surface-card border border-line flex items-center justify-center text-ink"><svg class="sloe-ico text-[16px]" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"/></svg></button>
      <span class="font-headline text-xl text-ink">2</span>
      <button class="w-8 h-8 rounded-full bg-surface-card border border-line flex items-center justify-center text-ink"><svg class="sloe-ico text-[16px]" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"/><path d="M12 5v14"/></svg></button>
    </div>
  </div>
  <section>
    <h2 class="font-headline text-lg text-ink mb-2">Ingredients</h2>
    <div class="space-y-2">
      <div class="flex items-center gap-3 bg-surface-card border border-line rounded-xl px-4 py-3"><span class="font-body text-[15px] text-ink flex-1">200 g · Cooked quinoa</span><svg class="sloe-ico text-ink-faint text-[18px]" viewBox="0 0 24 24" aria-hidden="true"><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></svg></div><div class="flex items-center gap-3 bg-surface-card border border-line rounded-xl px-4 py-3"><span class="font-body text-[15px] text-ink flex-1">1 · Avocado</span><svg class="sloe-ico text-ink-faint text-[18px]" viewBox="0 0 24 24" aria-hidden="true"><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></svg></div><div class="flex items-center gap-3 bg-surface-card border border-line rounded-xl px-4 py-3"><span class="font-body text-[15px] text-ink flex-1">1 tin · Chickpeas</span><svg class="sloe-ico text-ink-faint text-[18px]" viewBox="0 0 24 24" aria-hidden="true"><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></svg></div><div class="flex items-center gap-3 bg-surface-card border border-line rounded-xl px-4 py-3"><span class="font-body text-[15px] text-ink flex-1">2 tbsp · Tahini</span><svg class="sloe-ico text-ink-faint text-[18px]" viewBox="0 0 24 24" aria-hidden="true"><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></svg></div>
    </div>
    <button class="mt-2 flex items-center gap-2 font-body text-sm font-semibold text-clay py-1"><svg class="sloe-ico text-[18px]" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"/><path d="M12 5v14"/></svg> Add ingredient</button>
  </section>
  <section>
    <h2 class="font-headline text-lg text-ink mb-2">Method</h2>
    <div class="space-y-2">
      <div class="flex gap-3 bg-surface-card border border-line rounded-xl px-4 py-3"><span class="font-headline text-lg text-ink-faint">1</span><span class="font-body text-[15px] text-ink flex-1">Cook the quinoa and let it cool slightly.</span></div><div class="flex gap-3 bg-surface-card border border-line rounded-xl px-4 py-3"><span class="font-headline text-lg text-ink-faint">2</span><span class="font-body text-[15px] text-ink flex-1">Roast the chickpeas with spices until crisp.</span></div>
    </div>
    <button class="mt-2 flex items-center gap-2 font-body text-sm font-semibold text-clay py-1"><svg class="sloe-ico text-[18px]" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"/><path d="M12 5v14"/></svg> Add step</button>
  </section>
  <button class="w-full bg-clay text-white font-body font-semibold text-base rounded-full py-4">Save recipe</button>
</main>
<script>document.addEventListener('click',function(e){
 var n=e.target.closest('[data-nav]'); if(n){e.preventDefault();location.href=n.getAttribute('data-nav');return;}
 var el=e.target.closest('a,button,[role=button],label'); if(!el) return;
 var t=(el.textContent||'').trim().toLowerCase().replace(/\s+/g,' ');
 var nx=document.body.getAttribute('data-next');
 var map={'get started':'onboarding.html','i already have an account':'auth.html','continue with apple':'onboarding.html','continue with google':'onboarding.html','continue with email':'onboarding.html','continue':nx,'next step':nx,'no allergies':'onboarding-plan.html','start using sloe':'today.html','start cooking':'cook.html','cook':'cook.html','import recipe':'recipe-verify.html','add custom item':null,'log a meal':'logmeal.html'};
 if(t in map && map[t]){e.preventDefault();location.href=map[t];return;}
 var card=e.target.closest('[data-recipe],.recipe-card'); if(card){e.preventDefault();location.href='recipe.html';}
},true);</script>
</body></html>
