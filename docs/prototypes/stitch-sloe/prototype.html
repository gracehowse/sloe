<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Sloe · Mobile prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:radial-gradient(120% 120% at 50% 0%,#F3EFE9 0%,#E8E2EC 60%,#Dfd9e4 100%);font-family:Inter,system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;color:#221B26}
  .top{width:100%;display:flex;align-items:center;justify-content:center;gap:14px;padding:18px;flex-wrap:wrap}
  .top .brand{font-family:Newsreader,serif;font-size:22px;font-weight:600;color:#3B2A4D;margin-right:6px}
  .top .hint{font-size:13px;color:#6A6072}
  .btn{font-size:13px;font-weight:600;border:1px solid #E8E2EC;background:#fff;color:#221B26;border-radius:999px;padding:8px 14px;cursor:pointer}
  .btn.primary{background:#C8794E;color:#fff;border-color:#C8794E}
  .frame{margin:8px auto 48px;width:432px;height:806px;background:#1b1814;border-radius:52px;padding:11px;box-shadow:0 40px 80px -20px rgba(34,27,38,.45),0 0 0 2px rgba(0,0,0,.2);overflow:hidden;position:relative}
  .notch{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:150px;height:30px;background:#1b1814;border-radius:0 0 18px 18px;z-index:5}
  .screen{width:410px;height:784px;border-radius:42px;overflow:hidden;background:#fff;position:relative}
  iframe{width:500px;height:956px;border:0;transform:scale(.82);transform-origin:top left;background:#fff}
</style></head>
<body>
  <div class="top">
    <span class="brand">Sloe</span><span class="hint">Mobile prototype — tap through it like the real app</span>
    <button class="btn primary" onclick="go('onboarding-welcome.html')">↺ Restart flow</button>
    <button class="btn" onclick="go('today.html')">Skip to app</button>
    <button class="btn" onclick="document.getElementById('f').contentWindow.history.back()">‹ Back</button>
  </div>
  <div class="frame">
    <div class="notch"></div>
    <div class="screen"><iframe id="f" name="screen" src="onboarding-welcome.html"></iframe></div>
  </div>
  <script>function go(u){document.getElementById('f').src=u;}</script>
</body></html>
