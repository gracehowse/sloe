<main class="px-5 pt-4 pb-28 max-w-2xl mx-auto">
  <h1 class="font-headline text-3xl text-plum">Any dietary preferences we should consider?</h1>
  <p class="font-body text-sm text-ink-soft mt-2">We'll keep these in mind for every suggestion — you can change them anytime.</p>
  <div class="space-y-3 mt-6">
    <label class="block"><div class="rounded-2xl border border-line px-4 py-3.5">
    <p class="font-headline text-lg text-ink leading-tight">Vegetarian</p>
    <p class="font-body text-[13px] text-ink-soft mt-0.5">No meat, poultry or fish — eggs and dairy are fine.</p>
  </div></label>
    <label class="block"><div class="rounded-2xl border border-line px-4 py-3.5">
    <p class="font-headline text-lg text-ink leading-tight">Vegan</p>
    <p class="font-body text-[13px] text-ink-soft mt-0.5">No animal products at all.</p>
  </div></label>
    <label class="block"><div class="rounded-2xl border border-line px-4 py-3.5">
    <p class="font-headline text-lg text-ink leading-tight">Pescatarian</p>
    <p class="font-body text-[13px] text-ink-soft mt-0.5">No meat or poultry, but fish and seafood are in.</p>
  </div></label>
    <label class="block"><div class="rounded-2xl border border-line px-4 py-3.5">
    <p class="font-headline text-lg text-ink leading-tight">Low-carb</p>
    <p class="font-body text-[13px] text-ink-soft mt-0.5">Lean on protein and fats over carbs.</p>
  </div></label>
    <label class="block"><div class="rounded-2xl border border-line px-4 py-3.5">
    <p class="font-headline text-lg text-ink leading-tight">Dairy-free</p>
    <p class="font-body text-[13px] text-ink-soft mt-0.5">No dairy.</p>
  </div></label>
    <label class="block"><div class="rounded-2xl border border-plum bg-surface-card px-4 py-3.5">
    <p class="font-headline text-lg text-ink leading-tight">None, I eat everything</p>
    <p class="font-body text-[13px] text-ink-soft mt-0.5">No restrictions — you can update this later.</p>
  </div></label>
  </div>
</main>
<div class="fixed bottom-0 left-0 w-full bg-surface border-t border-line px-5 pt-3 pb-7"><button class="w-full bg-clay text-white font-body font-semibold text-base rounded-full py-4">Continue</button></div>
