<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Sloe · Today prototypes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Newsreader:wght@500&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,sans-serif;background:#FBF8F3;color:#221B26;padding:24px 28px 48px}
  h1{font-family:Newsreader,serif;font-weight:500;color:#3B2A4D;font-size:28px;margin-bottom:6px}
  p{color:#6A6072;font-size:14px;margin-bottom:20px;max-width:72ch}
  nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px}
  nav a{font-size:13px;font-weight:600;text-decoration:none;color:#3B2A4D;background:#EDEAF1;padding:8px 14px;border-radius:999px;border:1px solid #E8E2EC}
  nav a:hover{background:#fff}
  nav a.on{background:#3B2A4D;color:#fff;border-color:#3B2A4D}
  .stage{display:flex;justify-content:center}
  iframe{width:390px;min-height:900px;border:0;border-radius:24px;box-shadow:0 16px 40px rgba(59,42,77,.14);background:#fff}
</style>
</head>
<body>
  <h1>Today · Stitch HTML</h1>
  <p>Rebuilt 2026-06-04 — minimal week strip, Under/Over budget chips, plum overage lap, Fibre on TD4. Pick a variant:</p>
  <nav id="nav"></nav>
  <div class="stage"><iframe id="frame" title="Today prototype"></iframe></div>
  <script>
    const screens = [
      ['today.html','Today (logged, under)'],
      ['today-empty.html','Today (empty)'],
      ['today-over.html','Today (over)'],
      ['today-dark.html','Today (dark)'],
      ['today-activity.html','TD1 · Activity'],
      ['today-hydration.html','TD2 · Hydration'],
      ['today-insight.html','TD3 · Weekly insight'],
      ['today-meallog.html','TD4 · Meal log'],
    ];
    const nav = document.getElementById('nav');
    const frame = document.getElementById('frame');
    const pick = (href, label) => {
      frame.src = href;
      nav.querySelectorAll('a').forEach(a => a.classList.toggle('on', a.textContent === label));
    };
    screens.forEach(([href, label]) => {
      const a = document.createElement('a');
      a.href = '#'; a.textContent = label;
      a.onclick = e => { e.preventDefault(); pick(href, label); };
      nav.appendChild(a);
    });
    pick(screens[0][0], screens[0][1]);
  </script>
</body>
</html>
