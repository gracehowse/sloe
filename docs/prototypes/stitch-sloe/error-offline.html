<body class="bg-surface text-ink font-body antialiased">

</header>
<main class="px-6 pt-24 pb-10 max-w-2xl mx-auto flex flex-col items-center text-center">
  <span class="w-16 h-16 rounded-full bg-surface-card border border-line flex items-center justify-center text-ink-faint mb-5"><svg class="sloe-ico text-3xl" viewBox="0 0 24 24" aria-hidden="true"><path d="m2 2 20 20"/><path d="M5.782 5.782A7 7 0 0 0 9 19h8.5a4.5 4.5 0 0 0 1.307-.193"/><path d="M21.532 16.5A4.5 4.5 0 0 0 17.5 10h-1.79A7.008 7.008 0 0 0 10 5.07"/></svg></span>

<nav class="w-full bg-surface border-t border-line flex justify-around items-end px-4 pt-3 pb-6">

<a href="cookbook.html" class="flex flex-col items-center justify-center gap-1" style="color:#9B93A3"><svg class="sloe-ico mb-0.5" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg><span class="font-label text-[10px] tracking-wide uppercase font-medium">Recipes</span></a><a href="progress.html" class="flex flex-col items-center justify-center gap-1" style="color:#9B93A3"><svg class="sloe-ico mb-0.5" viewBox="0 0 24 24" aria-hidden="true"><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></svg><span class="font-label text-[10px] tracking-wide uppercase font-medium">Progress</span></a>
</nav>
<script>document.addEventListener('click',function(e){
 var n=e.target.closest('[data-nav]'); if(n){e.preventDefault();location.href=n.getAttribute('data-nav');return;}
 var el=e.target.closest('a,button,[role=button],label'); if(!el) return;
 var t=(el.textContent||'').trim().toLowerCase().replace(/\s+/g,' ');
 var nx=document.body.getAttribute('data-next');
 var map={'get started':'onboarding.html','i already have an account':'auth.html','continue with apple':'onboarding.html','continue with google':'onboarding.html','continue with email':'onboarding.html','continue':nx,'next step':nx,'no allergies':'onboarding-plan.html','start using sloe':'today.html','start cooking':'cook.html','cook':'cook.html','import recipe':'recipe-verify.html','add custom item':null,'log a meal':'logmeal.html'};
 if(t in map && map[t]){e.preventDefault();location.href=map[t];return;}
 var card=e.target.closest('[data-recipe],.recipe-card'); if(card){e.preventDefault();location.href='recipe.html';}
},true);</script>
