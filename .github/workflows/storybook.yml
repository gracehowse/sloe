# Component-level Storybook build + interaction/a11y smoke (not full-route visual QA).
name: Storybook

on:
  push:
    branches: [main]
    paths:
      - "src/app/components/**"
      - "src/stories/**"
      - ".storybook/**"
      - "src/styles/**"
      - ".github/workflows/storybook.yml"
  pull_request:
    # ENG-853: `storybook` is a required branch-protection context. A
    # top-level PR `paths` filter leaves required checks Pending on docs-only
    # PRs, so every PR must enter this workflow. Push-to-main remains filtered.

concurrency:
  group: storybook-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  storybook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build-storybook
      - name: Storybook tests (vitest — plays, a11y, interactions, 100% UI coverage)
        run: npm run test:storybook:coverage
