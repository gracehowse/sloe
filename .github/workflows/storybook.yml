# Component-level Storybook build + coverage + Chromatic publish.
# Interaction/a11y smoke via vitest; catalog completeness via check:storybook-coverage;
# hosted snapshots via Chromatic Storybook (always-current — 2026-07-22 decision).
name: Storybook

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/app/components/**"
      - "apps/mobile/components/**"
      - "src/stories/**"
      - "apps/mobile/stories/**"
      - ".storybook/**"
      - "src/styles/**"
      - "scripts/check-storybook-coverage.mjs"
      - "scripts/storybook-coverage-skips.json"
      - ".github/workflows/storybook.yml"
  pull_request:
    # ENG-853: `storybook` is a required branch-protection context. A
    # top-level PR `paths` filter leaves required checks Pending on docs-only
    # PRs, so every PR must enter this workflow. Push-to-main remains filtered.

concurrency:
  group: storybook-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  storybook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Mobile colocated stories need apps/mobile deps (react-native-svg, etc.).
      # Root npm ci does not install them; without this, Vite fails to resolve
      # packages that exist only under apps/mobile/package.json.
      - name: Install mobile dependencies
        run: npm ci --prefix apps/mobile
      - name: Storybook coverage ratchet (sibling stories or explicit skips)
        run: npm run check:storybook-coverage
      - run: npx playwright install --with-deps chromium
      - run: npm run build-storybook
      - name: Storybook tests (vitest — plays, a11y, interactions, 100% UI coverage)
        run: npm run test:storybook:coverage
      - name: Publish Storybook to Chromatic
        # Prefer CHROMATIC_STORYBOOK_PROJECT_TOKEN when Storybook and Playwright
        # Chromatic are separate projects; else CHROMATIC_PROJECT_TOKEN.
        # Do NOT gate this step on `secrets.*` in `if:` — GitHub rejects that
        # context in workflow `if` expressions and the whole Storybook workflow
        # fails to parse (0 jobs / no PR check). Empty token fails the step;
        # repo secrets are required for a published catalog.
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_STORYBOOK_PROJECT_TOKEN || secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: storybook-static
          exitZeroOnChanges: true
          # Full catalog every publish (2026-07-22 always-current). TurboSnap
          # `onlyChanged` in chromatic.config.json makes the dashboard show only
          # the N changed stories (e.g. "4 Components / 4 Stories") and hides the
          # real library size — wrong for the coverage gate. Playwright Chromatic
          # already forces onlyChanged: false for the same reason.
          onlyChanged: false
          # Match Playwright Chromatic posture: inform + browsable history,
          # not a merge gate. Catalog completeness is gated by
          # check:storybook-coverage above.
          autoAcceptChanges: true
