name: CI

on:
  # Push runs only on main (and any future release branches added here).
  # PR-targeted branches use the `pull_request` trigger below — listing
  # both unconditionally would double-spend Actions minutes on every
  # same-repo PR push.
  push:
    branches: [main]
  pull_request:

# Cancel older runs when a new commit lands (avoids zombie jobs stuck on E2E, etc.)
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ENG-1627 (2026-07-20): `test`/`mobile` are required status checks on
  # `main`'s branch protection. This used to be a top-level `paths-ignore`
  # on the whole workflow, which meant a docs-only PR never triggered the
  # workflow at all — so GitHub never received ANY status for the "test"/
  # "mobile" contexts, and the PR was permanently BLOCKED (a required check
  # that never reports can never be satisfied; this is different from a
  # *skipped* job, which GitHub treats as passed). Fix: always trigger the
  # workflow, but gate the expensive jobs on this cheap up-front diff check
  # so they report a fast "skipped" (= satisfied) instead of never running.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect non-docs changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # predicate-quantifier: every is required for the negation idiom
          # below to work. paths-filter's default (`some` = OR) treats a
          # multi-pattern filter as "matches ANY pattern" — with '**' listed
          # first, that OR is satisfied by every file regardless of the `!`
          # negations, so `code` always evaluated true (ENG-1627 follow-up,
          # caught live: a pure docs-only PR still ran dep-audit and failed
          # it). `every` makes it AND: a file only counts as "code" if it
          # matches '**' AND is NOT '**.md' AND is NOT 'docs/**'.
          predicate-quantifier: every
          filters: |
            code:
              - '**'
              - '!**.md'
              - '!docs/**'

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      # Baked into the Next client bundle at build; set repo secrets for real Supabase auth in E2E.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      FATSECRET_TIER: premier
      # Keep 0 in CI: repository/org secrets often include STRIPE_SECRET_KEY without webhook/price IDs,
      # which makes verify-production-env exit 1 under VERIFY_STRICT=1 (see scripts/verify-production-env.ts).
      # Run VERIFY_STRICT=1 locally or in deploy pipelines when you want a hard gate.
      VERIFY_STRICT: "0"
      # Gate the optional food-search + Gate-0-live steps here — the `secrets`
      # context is NOT allowed in a step-level `if:` (fails workflow validation,
      # which manifests as a 0s job failure), but a job-level env that reads the
      # secret is, and `env.` IS allowed in `if:`.
      SUPPR_TEST_AUTH_BEARER: ${{ secrets.SUPPR_TEST_AUTH_BEARER }}
      GATE0_VERIFY_PASSWORD: ${{ secrets.GATE0_VERIFY_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Production env checklist
        run: npm run verify:production-env
      - name: Migration filename + duplicate check (static, no Supabase auth)
        # P1-11 (2026-04-25): catches malformed `<14-digit>_<name>.sql`
        # filenames and duplicate timestamps / names before they get
        # applied. The full drift comparison (vs the linked project)
        # stays a local / scheduled task — needs Supabase CLI auth.
        run: npm run check:migrations:static
      - name: Supabase type parity (web/mobile)
        run: npm run db:types:check
      - name: Gate-0 DB security contracts (static, ENG-1102)
        run: npm run verify:gate0:static
      - name: Gate-0 live DB verify (optional — linked Supabase + throwaway creds)
        if: ${{ env.GATE0_VERIFY_PASSWORD != '' }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          GATE0_VERIFY_EMAIL: ${{ secrets.GATE0_VERIFY_EMAIL }}
          GATE0_VERIFY_PASSWORD: ${{ secrets.GATE0_VERIFY_PASSWORD }}
        run: npm run verify:gate0:live
      - name: Typecheck
        run: npm run typecheck
      - name: ESLint (web + shared tests)
        run: npm run lint
      - name: Unit/component tests (with coverage report)
        run: npm run test:coverage
      - name: Today premium capture pairs (ENG-629)
        run: npm run check:today-captures
      - name: Type scale lint (ENG-119)
        run: npm run check:type-scale
      - name: Spacing scale ratchet (ENG-1007)
        # Gives teeth to "Spacing snaps to the scale" (4/8/12/16/20/24/32/40).
        # Flags off-scale mobile spacing literals. Legacy offenders are pinned
        # in scripts/spacing-budget.json and may only shrink; any new
        # off-scale value (or a pinned file gaining one) fails.
        run: npm run check:spacing-scale
      - name: Web spacing scale ratchet (ENG-1592)
        # The web leg ENG-1007's own code comment promised and never built.
        # Flags off-scale Tailwind p-*/m-*/gap-* spacing on web `.tsx`
        # (src/app, app) — arbitrary rounded-[Npx] brackets AND off-scale
        # numeric Tailwind steps (p-7 = 28px is off-scale; p-6 = 24px is
        # legal), against the same 4/8/12/16/20/24/32/40 scale. Legacy
        # offenders are pinned in scripts/web-spacing-budget.json and may
        # only shrink; any new off-scale value (or a pinned file gaining
        # one) fails.
        run: npm run check:web-spacing-scale
      - name: Token scale ratchet (ENG-1007)
        # Gives teeth to "Tokens only" — flags raw hexes, raw Tailwind palette
        # colour classes, and off-scale borderRadius across web + mobile.
        # Legacy offenders are pinned in scripts/token-budget.json and may
        # only shrink; any new off-token value fails.
        run: npm run check:token-scale
      - name: Web radius ratchet (ENG-1499)
        # Card-grammar gate (2026-07-10 ruling): flags retired rounded-2xl /
        # rounded-3xl classes and arbitrary rounded-[Npx] off {12, 24} in web
        # .tsx. Legacy offenders are pinned in scripts/web-radius-budget.json
        # and may only shrink; any new off-grammar radius fails.
        run: npm run check:web-radius
      - name: Mobile type-scale ratchet (ENG-1002)
        # Mobile counterpart of the ENG-119 web type-scale gate above. Gives
        # teeth to "Type comes from the ramp" on mobile: flags raw `fontSize: N`
        # literals off the `Type` ramp (apps/mobile/constants/theme.ts) in
        # apps/mobile/app + apps/mobile/components `.tsx`. Runs on the web job
        # since the checkout includes apps/mobile. Legacy offenders are pinned
        # in scripts/type-scale-mobile-budget.json and may only shrink; any new
        # off-ramp size (or a pinned file gaining one) fails.
        run: npm run check:type-scale-mobile
      - name: Pressable-feedback ratchet (ENG-1519)
        # Gives teeth to "Pressables go through PressableScale with the right
        # haptic weight". Pins the 84 mobile files with raw feedbackless
        # <Pressable> (scripts/pressable-feedback-budget.json) only-shrink; a new
        # raw <Pressable> without PressableScale/SupprButton/inline pressed fails.
        run: npm run check:pressable-feedback
      - name: Screen line-count ratchet (ENG-717)
        # Gives teeth to the "No screen file over 400 lines" rule. Scans
        # both web (src/app/components, app) and mobile (apps/mobile/app,
        # apps/mobile/components) `.tsx` surfaces; runs once on the web job
        # since the checkout includes apps/mobile. Allow-listed legacy
        # offenders are pinned in scripts/screen-line-budget.json and may
        # only shrink; any new file crossing 400 lines fails.
        run: npm run check:screen-budget
      - name: Redesign foundation touch ratchet (ENG-1247)
        # Flags edits to Sloe v3 redesign-foundation files that skip the
        # required conformance/verification pass. Runs on the web job since
        # the checkout includes apps/mobile.
        run: npm run check:redesign-foundation-touch
      - name: Nutrition/health claims lint (ENG-536/ENG-1545)
        # Fails on absolute health/nutrition claims in user-facing code
        # (cure/cures, boost metabolism, fat-burning, detox, torch calories,
        # 100% accurate, …). ENG-1545 wired this into CI — it was defined but
        # never run before, so the gate was inert. Scans src + apps/mobile + app.
        run: npm run check:nutrition-claims
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build
        run: npm run build
      - name: PostHog first-party-proxy check (ENG-1559)
        # Bundle-scan half needs .next/static, hence after Build. Previously
        # this gate only ran in the local `npm run ci` chain (package.json)
        # and did not actually block merges — see
        # docs/decisions/2026-06-19-posthog-first-party-proxy.md.
        run: npm run check:posthog-proxy
      - name: E2E (smoke)
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3100
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          # Tells rateLimit.ts's isProductionRuntime() this `next start`
          # process is serving Playwright, not a real deploy, so it uses the
          # in-memory fallback instead of failing closed with no Upstash
          # configured (found 2026-07-21: rate-limited routes 429'd on their
          # first request every run). See rateLimit.ts's isProductionRuntime doc.
          SUPPR_E2E_SERVER: "1"
        run: |
          npm run start -- --port 3100 &
          npx wait-on http://127.0.0.1:3100/login
          npm run test:e2e
      - name: Food search provider smoke (optional — F-05)
        if: ${{ env.SUPPR_TEST_AUTH_BEARER != '' }}
        env:
          SUPPR_TEST_API_BASE: http://127.0.0.1:3100
          SUPPR_TEST_AUTH_BEARER: ${{ secrets.SUPPR_TEST_AUTH_BEARER }}
          SUPPR_E2E_SERVER: "1"
          FATSECRET_CLIENT_ID: ${{ secrets.FATSECRET_CLIENT_ID }}
          FATSECRET_CLIENT_SECRET: ${{ secrets.FATSECRET_CLIENT_SECRET }}
          FATSECRET_TIER: premier
          USDA_FDC_API_KEY: ${{ secrets.USDA_FDC_API_KEY }}
          EDAMAM_APP_ID: ${{ secrets.EDAMAM_APP_ID }}
          EDAMAM_APP_KEY: ${{ secrets.EDAMAM_APP_KEY }}
        run: |
          npm run start -- --port 3100 &
          npx wait-on http://127.0.0.1:3100/login
          npm run test -- --run tests/unit/foodSearchProviderIntegration.test.ts
      - name: Upload Playwright HTML report (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  mobile:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json
      # Shared src/lib/* is type-checked by mobile tsc via the @suppr/shared/*
      # alias; those files import react etc. which resolve from ROOT node_modules.
      # Without this, mobile typecheck can't resolve `react` (e.g. useImportQueue.ts).
      - name: Install root deps (for shared-lib types in mobile typecheck)
        working-directory: ${{ github.workspace }}
        run: npm ci
      - name: Install mobile deps
        run: npm ci
      - name: Mobile ESLint (errors fail; warnings allowed)
        run: npm run lint
      - name: Mobile TypeScript
        run: npm run typecheck
      - name: Shared @suppr/shared re-export paths + cross-boundary resolve
        # ENG-551 (2026-05-16): mobile cross-imports use the `@suppr/shared/*`
        # path alias, not relative `../../../` chains. ENG-1074 (2026-06-13):
        # the three former inline steps (two re-export greps + the resolve loop)
        # are now ONE script shared with local `npm run ci`, so a bad
        # `@suppr/shared/*` path is caught before push. The script also fixes a
        # latent bug here — the old resolve loop ran in a `grep | while` pipe
        # subshell, so `FAIL=1` never escaped and a MISSING import still passed.
        # ENG-1358 (2026-07-05): also runs check-mobile-relative-src-reach.mjs,
        # an only-shrink ratchet flagging raw `(../)+src/...` reaches that
        # bypass the alias entirely (the other half of this boundary).
        working-directory: ${{ github.workspace }}
        run: npm run check:mobile-shared-imports
      - name: Mobile unit tests (with coverage report)
        run: npm run test:coverage
      - name: Metro bundle-check (catches RN/Expo SDK mismatches before EAS)
        # Lint + typecheck + vitest do NOT drive Metro through the canonical
        # lockfile-resolved tree (vitest uses an apps/mobile/vitest.config.ts
        # `react-native` shim). So dep-graph bugs like ENG-562 (RN 0.85 vs
        # Expo 54's babel-preset-expo) slip past the existing gates and only
        # explode on a real EAS build or sim launch.
        # `expo export` runs the full Metro pipeline on the production code
        # path and fails fast on schema-parse / codegen mismatches.
        # See docs/decisions/2026-05-17-rn-rollback.md for the incident
        # that prompted this gate.
        env:
          SENTRY_DISABLE_AUTO_UPLOAD: "true"
          EXPO_PUBLIC_SUPABASE_URL: "https://ci-placeholder.example.com"
          EXPO_PUBLIC_SUPABASE_ANON_KEY: "ci-placeholder-anon-key"
        run: |
          rm -rf /tmp/expo-bundle-check
          npx expo export --platform ios --dev=false --output-dir /tmp/expo-bundle-check
          if [ ! -d /tmp/expo-bundle-check ]; then
            echo "::error::expo export produced no output directory."
            exit 1
          fi
          BUNDLE=$(find /tmp/expo-bundle-check -name '*.js' -size +1M | head -1)
          if [ -z "$BUNDLE" ]; then
            echo "::error::expo export bundle has no .js file >1MB. Likely a Metro silent failure."
            exit 1
          fi
          echo "OK — mobile bundle generated: $BUNDLE"
      - name: Maestro suite manifest (listed flows + shared runFlow exist)
        run: npm run test:e2e:verify-suite

  # Soft spot 1 (2026-05-14 production-readiness audit) — secret scan
  # on every push + PR. Mirrors the local pre-commit hook
  # (scripts/git-hooks/pre-commit) so contributors who skip the local
  # hook still hit the gate before merge.
  # Docs: docs/operations/git-hooks.md
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      # 2026-05-15 fix: gitleaks-action@v2 needs `pull-requests: write` to
      # post inline diff annotations + comment on the PR. Without it the
      # action exits with `RequestError: Resource not accessible by
      # integration` (HTTP 403), which our `if: failure()` step
      # misinterprets as "secret detected" — surfacing a misleading red
      # CI gate. Keeping `contents: read` for the checkout; adding the
      # minimum needed for the action to function.
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          # Fetch full history so gitleaks can scan back to the merge base
          # of the PR — partial history misses secrets introduced in older
          # commits on the branch.
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          # No GITLEAKS_LICENSE — org is small and the action runs free
          # for public + small private repos without it. If the org is
          # ever flagged, register a free licence and add as a secret.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: On failure — guidance
        if: failure()
        run: |
          echo "::error::Secret detected in commit history. See gitleaks output above."
          echo "::error::Remove the secret, ROTATE it with the vendor, then re-push."
          echo "::error::Local fast-fail: install gitleaks + 'git config core.hooksPath scripts/git-hooks'."
          echo "::error::Full docs: docs/operations/git-hooks.md"
          exit 1

  # Soft spot 1 (2026-05-14 production-readiness audit) — npm-audit gate.
  # Runs against web root + mobile package tree separately because each
  # has its own transitive dep set. --omit=dev skips findings on tooling
  # that ships to no user (vitest, playwright, eslint, etc.).
  # Allow-list mechanism: docs/operations/security-allowlist.md
  dep-audit:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Web — npm audit (production deps, high+ severity)
        run: |
          set +e
          npm audit --audit-level=high --omit=dev
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::error::Web dep-audit found high or critical vulnerabilities."
            echo "::error::Fix path: 'npm audit fix' locally. If can't patch today,"
            echo "::error::see docs/operations/security-allowlist.md to consciously defer."
            exit "$status"
          fi
      - name: Mobile — npm audit (production deps, high+ severity)
        working-directory: apps/mobile
        run: |
          set +e
          npm audit --audit-level=high --omit=dev
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::error::Mobile dep-audit found high or critical vulnerabilities."
            echo "::error::Fix path: 'npm audit fix' in apps/mobile/. If can't patch today,"
            echo "::error::see docs/operations/security-allowlist.md to consciously defer."
            exit "$status"
          fi

  # Soft spot 1 (2026-05-14 production-readiness audit) — sourcemap
  # verification. Asserts that 'next build' produced .js.map files in
  # .next/static/ so Sentry has frames-not-minified to symbolicate
  # against. The actual upload to Sentry happens in the Vercel deploy
  # step (withSentryConfig hooks); this job verifies the build artefact
  # locally so we catch a regression on the *generation* side before
  # Vercel runs.
  sourcemap-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      VERIFY_STRICT: "0"
      # @sentry/nextjs v10 deletes client .map files at the end of
      # `next build` regardless of whether upload succeeded. Without
      # this, the assertion below always fails on CI (no auth token →
      # no upload, but deletion still runs). Vercel leaves the var
      # unset so prod retains the secure default.
      SENTRY_RETAIN_SOURCEMAPS: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Build (production)
        run: npm run build
      - name: Assert sourcemaps were generated
        run: |
          MAP_COUNT=$(find .next/static -type f -name '*.js.map' 2>/dev/null | wc -l | tr -d ' ')
          echo "Found $MAP_COUNT sourcemap files under .next/static/"
          if [ "$MAP_COUNT" -lt 1 ]; then
            echo "::error::No .js.map files found under .next/static/."
            echo "::error::Sentry symbolication will fail on production errors."
            echo "::error::Check next.config.ts -> productionBrowserSourceMaps and"
            echo "::error::sourcemaps.deleteSourcemapsAfterUpload — the SENTRY_RETAIN_SOURCEMAPS"
            echo "::error::env var on this job is what keeps the maps on disk for this assert."
            exit 1
          fi
          echo "OK — sourcemaps present. (Upload to Sentry happens in Vercel deploy step.)"
