name: CI

on:
  push:
  pull_request:

# Cancel older runs when a new commit lands (avoids zombie jobs stuck on E2E, etc.)
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Baked into the Next client bundle at build; set repo secrets for real Supabase auth in E2E.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      # Fail the env checklist on pushes to main when Stripe is half-configured (see scripts/verify-production-env.ts).
      VERIFY_STRICT: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && '1' || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Production env checklist
        run: npm run verify:production-env
      - name: Typecheck
        run: npm run typecheck
      - name: Unit/component tests
        run: npm test
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build
        run: npm run build
      - name: E2E (smoke)
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3100
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: |
          npm run start -- --port 3100 &
          npx wait-on http://127.0.0.1:3100/login
          npm run test:e2e

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json
      - name: Install mobile deps
        run: npm ci
      - name: Shared classifyMealType re-export path
        run: grep -q 'from "../../../src/lib/recipe-import/classifyMealType"' lib/classifyMealType.ts
      - name: Shared refreshAdaptiveTdee re-export path
        run: grep -q 'from "../../../src/lib/nutrition/refreshAdaptiveTdee"' lib/refreshAdaptiveTdee.ts
