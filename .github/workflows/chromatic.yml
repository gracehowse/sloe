# Chromatic Playwright E2E visual tests — archives from Playwright, reviewed in Chromatic.
# Requires CHROMATIC_PROJECT_TOKEN and @chromatic-com/playwright specs (chromatic-e2e.spec.ts).
# Storybook component tests: .github/workflows/storybook.yml + npm run test:storybook
name: Chromatic

on:
  push:
    branches: [main]
  pull_request:
    # ENG-853: this workflow posts required checks ("Run Chromatic" and
    # Chromatic's external "UI Tests"). A top-level PR `paths` filter leaves
    # those required contexts Pending forever on docs-only PRs, so PRs must
    # always enter the workflow. Keep push path filters out of this required
    # merge path if main-run cost needs tuning later.

concurrency:
  group: chromatic-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      VERIFY_STRICT: "0"
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3100
      CI: true
      GITHUB_ACTIONS: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build app
        run: npm run build
      - name: Run Playwright tests
        run: |
          npm run start -- --port 3100 &
          npx wait-on http://127.0.0.1:3100/login
          npx playwright test tests/e2e/chromatic-e2e.spec.ts --project=chromium
        env:
          HOME: /root
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: ./test-results
          retention-days: 30

  chromatic:
    name: Run Chromatic
    needs: playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Download Playwright test results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: ./test-results
      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          playwright: true
          # Playwright archives have no Storybook preview-stats.json; TurboSnap
          # (onlyChanged in chromatic.config.json) must be off for this job.
          onlyChanged: false
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          # 2026-06-14 (Grace) — Chromatic "UI Tests" is NOT a required status
          # check (only `test` + `mobile` gate merge), but its "N changes must
          # be accepted as baseline" pending state read as a blocker on every
          # visual PR. Auto-accept so it never asks for manual baseline review:
          # snapshots are still captured + browsable, but Chromatic informs
          # rather than gates. Visual QA is carried by manual SEE + the
          # Playwright golden specs. Set to `false` to re-enable review.
          autoAcceptChanges: true
        env:
          CHROMATIC_ARCHIVE_LOCATION: ./test-results
