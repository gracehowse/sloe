# Scheduled production crons — moved here from vercel.json (2026-07-01).
#
# Why not Vercel crons:
#   1. Hobby plan rejects sub-daily schedules — the hourly weigh-in cron made
#      EVERY deployment fail ("Deployment failed" on main since ENG-955 / #649;
#      the same limit was hit once before in b6b3fe95).
#   2. Vercel cron invocations cannot send custom headers, and all three cron
#      routes fail closed without `X-Cron-Secret` — so these schedules had
#      never successfully run in production at all.
# GitHub Actions can do both: sub-daily schedules and custom headers.
#
# Auth: `SUPPR_CRON_SECRET` repo secret (mirrors the Vercel production env
# var of the same name, minted 2026-07-01). Rotate in BOTH places together.
#
# Schedule → target mapping (a tick that matches several entries fires one
# run per entry; `github.event.schedule` says which):
#   0 * * * *  → /api/push/weigh-in-reminder   (hourly; per-user tz windows)
#   0 23 * * * → /api/push/weekly-recap        (daily 23:00 UTC, as before)
#   0 6 * * *  → /api/cron/supabase-advisor-check (daily 06:00 UTC, ENG-509 alarm 6)

name: Scheduled crons

on:
  schedule:
    - cron: "0 * * * *"
    - cron: "0 23 * * *"
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: "Which cron endpoint to invoke"
        required: true
        type: choice
        options:
          - weigh-in-reminder
          - weekly-recap
          - supabase-advisor-check

concurrency:
  group: scheduled-crons-${{ github.event.schedule || inputs.target }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write # open / comment the failure-alert issue (ENG-1400)

jobs:
  invoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Resolve target path
        id: target
        run: |
          case "${{ github.event.schedule || inputs.target }}" in
            "0 23 * * *"|"weekly-recap")            echo "path=/api/push/weekly-recap" >> "$GITHUB_OUTPUT" ;;
            "0 6 * * *"|"supabase-advisor-check")   echo "path=/api/cron/supabase-advisor-check" >> "$GITHUB_OUTPUT" ;;
            "0 * * * *"|"weigh-in-reminder")        echo "path=/api/push/weigh-in-reminder" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unknown trigger '${{ github.event.schedule || inputs.target }}'" >&2; exit 1 ;;
          esac
      - name: Invoke ${{ steps.target.outputs.path }}
        run: |
          for attempt in 1 2 3; do
            code=$(curl -s -o /tmp/cron-body.json -w "%{http_code}" \
              --max-time 120 \
              -X POST "https://suppr-club.com${{ steps.target.outputs.path }}" \
              -H "X-Cron-Secret: ${{ secrets.SUPPR_CRON_SECRET }}")
            echo "attempt $attempt → HTTP $code"
            cat /tmp/cron-body.json; echo
            if [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then exit 0; fi
            sleep $((attempt * 20))
          done
          echo "cron invocation failed after 3 attempts" >&2
          exit 1

      # --- Failure alerting: deduped GitHub issue, no external secret ---
      # ENG-1400 (2026-07-05 deep audit, PRA-002/IM-05): the advisor-check
      # cron 503'd silently every day from 2026-07-02 (SUPABASE_PAT unset)
      # because a red run here had no observer — nothing paged anyone.
      # Mirrors production-smoke.yml's dedup-by-label pattern so a run of
      # daily failures becomes ONE actionable issue, not 30.
      - name: Open or update failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TARGET: ${{ steps.target.outputs.path || github.event.schedule || inputs.target }}
        run: |
          set -euo pipefail

          gh label create scheduled-cron-failure --color B60205 \
            --description "A scheduled cron (scheduled-crons.yml) failed (ENG-1400)" 2>/dev/null || true

          # One issue per TARGET path, not one for the whole workflow — a
          # broken weekly-recap and a broken advisor-check are unrelated
          # failures and shouldn't dedup onto the same thread.
          safe_target=$(echo "$TARGET" | tr -c 'a-zA-Z0-9' '-')
          existing=$(gh issue list --label scheduled-cron-failure --state open \
            --search "\"cron-target:$safe_target\" in:body" \
            --json number --jq '.[0].number // empty')

          if [ -n "$existing" ]; then
            echo "Existing open issue #$existing for $TARGET — commenting instead of opening a duplicate."
            gh issue comment "$existing" --body \
              "🔴 \`$TARGET\` failed again — run: $RUN_URL (\`$(date -u '+%Y-%m-%d %H:%M UTC')\`)."
          else
            echo "No open issue for $TARGET — opening one."
            gh issue create \
              --title "🚨 Scheduled cron failing: $TARGET" \
              --label scheduled-cron-failure \
              --body "$(printf '%s\n' \
                "The scheduled cron \`$TARGET\` (invoked by \`.github/workflows/scheduled-crons.yml\`) failed after 3 retries." \
                "" \
                "**Failing run:** $RUN_URL" \
                "" \
                "Open the run log for the HTTP status + response body from each attempt." \
                "" \
                "This issue is deduped per cron target: while it stays open, further failures of \`$TARGET\` comment here rather than opening new issues. Close it once the cron is healthy and a run is green again." \
                "" \
                "cron-target:$safe_target" \
                "" \
                "_Opened automatically by \`.github/workflows/scheduled-crons.yml\` (ENG-1400)._")"
          fi
