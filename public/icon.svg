    Sloe app icon / favicon (web).
    Lowercase "sloe" wordmark in Fraunces, plum ink (#3B2A4D) on the warm
    cream/Oat ground (#F6F5F2) — matches the shipped mobile cream app icon
    (apps/mobile/assets/images/icon.png) and the 2026-06-04 brand decision
    (docs/brand/sloe/sloe-brand.md §4).
    Glyph paths are the canonical Fraunces wordmark vector
    (docs/brand/sloe/assets/gen/wordmark-final/sloe-fraunces-base.svg);
    centred in the maskable safe zone with comfortable padding.
  -->
  <rect width="1024" height="1024" fill="#F6F5F2"/>
  <!--
    Wordmark glyph box (pre-flip): x 0..2973, y 0..1481 (units).
    Centre it in a square and scale to ~62% of the icon width so the
    content sits inside the 80% maskable safe zone.
    Target width 640px -> scale = 640 / 2973 = 0.21527.
    Glyph height 1481 * 0.21527 = 318.8px.
    x offset to centre: (1024 - 640) / 2 = 192.
    y offset to centre: (1024 - 318.8) / 2 + 1481*0.21527 = 352.6 + 318.8 = 671.4
    (baseline sits at bottom of the flipped group).
  -->
